<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PANEL DSC</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #0f1525;
    --surface2: #141c2e;
    --border: #1e2d4a;
    --accent: #1a6bff;
    --accent2: #00c6a2;
    --accent3: #FFD600;
    --danger: #ff4757;
    --text: #c8d8f0;
    --text-dim: #4a6080;
    --text-bright: #ffffff;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
  }

  /* ── VISTA HOME ── */
  #home {
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  .home-header {
    padding: 20px 20px 0;
    flex-shrink: 0;
  }

  .home-logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .home-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text-bright);
    line-height: 1;
  }

  .home-title span { color: var(--accent2); }

  .home-subtitle {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    margin-top: 4px;
  }

  /* STATUS STRIP */
  .status-strip {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 16px 20px 0;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    flex-shrink: 0;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
  }

  .sdot {
    width: 6px; height: 6px;
    border-radius: 50%;
    animation: blink 2s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  .sdot.green { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .sdot.blue  { background: var(--accent);  box-shadow: 0 0 6px var(--accent); }

  #clock-home {
    margin-left: auto;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent3);
    letter-spacing: 1px;
  }

  /* PLANILLAS GRID */
  .planillas {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 20px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .planilla-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
    text-align: left;
    width: 100%;
    -webkit-user-select: none;
    user-select: none;
  }

  .planilla-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }

  .planilla-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 50%, currentColor 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .planilla-btn:active { transform: scale(0.97); }
  .planilla-btn:active::after { opacity: 0.04; }

  .planilla-btn.green::before { background: var(--accent2); }
  .planilla-btn.blue::before  { background: var(--accent); }
  .planilla-btn.yellow::before { background: var(--accent3); }
  .planilla-btn.red::before   { background: var(--danger); }
  .planilla-btn[style*="--color"]::before { background: var(--color,#00e5ff); }

  .planilla-btn.green:active { border-color: var(--accent2); box-shadow: 0 0 20px rgba(0,198,162,0.15); }
  .planilla-btn.blue:active  { border-color: var(--accent);  box-shadow: 0 0 20px rgba(26,107,255,0.15); }
  .planilla-btn.yellow:active { border-color: var(--accent3); box-shadow: 0 0 20px rgba(255,214,0,0.15); }
  .planilla-btn.red:active   { border-color: var(--danger);  box-shadow: 0 0 20px rgba(255,71,87,0.15); }

  .btn-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .green .btn-icon { background: rgba(0,198,162,0.12); border: 1px solid rgba(0,198,162,0.25); }
  .blue  .btn-icon { background: rgba(26,107,255,0.12); border: 1px solid rgba(26,107,255,0.25); }
  .yellow .btn-icon { background: rgba(255,214,0,0.12); border: 1px solid rgba(255,214,0,0.25); }
  .red   .btn-icon { background: rgba(255,71,87,0.12);  border: 1px solid rgba(255,71,87,0.25); }

  .btn-text { flex: 1; }

  .btn-name {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text-bright);
    margin-bottom: 3px;
  }

  .btn-desc {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .btn-arrow {
    font-size: 18px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  /* ── VISTA PLANILLA ── */
  #planilla-view {
    display: none;
    height: 100%;
    flex-direction: column;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--bg);
  }

  #planilla-view.open {
    display: flex;
  }

  /* NAVBAR PLANILLA */
  .plnav {
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 12px;
    flex-shrink: 0;
    position: relative;
  }

  .plnav::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    opacity: 0.5;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .back-btn:active { background: rgba(26,107,255,0.15); border-color: var(--accent); }

  .plnav-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--accent2);
    flex: 1;
    text-align: center;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .plnav-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* IFRAME */
  #planilla-frame {
    flex: 1;
    border: none;
    width: 100%;
    background: white;
  }

  /* LOADING */
  .frame-loading {
    position: absolute;
    inset: 52px 0 0 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    gap: 14px;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .frame-loading.hidden { opacity: 0; }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
  }

  /* GRID BACKGROUND */
  #home::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(30,45,74,0.25) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,45,74,0.25) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .home-header, .status-strip, .planillas { position: relative; z-index: 1; }

  /* GLOW */
  .glow-orb {
    position: fixed;
    width: 300px; height: 300px;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }

  .glow-1 { top: -100px; right: -50px; background: rgba(26,107,255,0.08); }
  .glow-2 { bottom: -100px; left: -50px; background: rgba(0,198,162,0.06); }
</style>
</head>
<body>

<!-- GLOW ORBS -->
<div class="glow-orb glow-1"></div>
<div class="glow-orb glow-2"></div>

<!-- ── HOME ── -->
<div id="home">
  <div class="home-header">
    <div class="home-logo">Sistema de Control</div>
    <div class="home-title">PANEL <span>DSC</span></div>
    <div class="home-subtitle">SELECCIONÁ UNA PLANILLA</div>
  </div>

  <div class="status-strip">
    <div class="status-item">
      <div class="sdot green"></div>
      FIREBASE
    </div>
    <div class="status-item">
      <div class="sdot blue"></div>
      VERCEL
    </div>
    <div id="clock-home">--:--:--</div>
  </div>

  <div class="planillas">

    <button class="planilla-btn green" onclick="openPlanilla('turnos')">
      <div class="btn-icon">📋</div>
      <div class="btn-text">
        <div class="btn-name">CONTROL DE TURNOS</div>
        <div class="btn-desc">Registro de turnos por agente</div>
      </div>
      <div class="btn-arrow">›</div>
    </button>

    <button class="planilla-btn blue" onclick="openPlanilla('negra')">
      <div class="btn-icon">📊</div>
      <div class="btn-text">
        <div class="btn-name">PLANILLA DE CONTROL</div>
        <div class="btn-desc">Control general de operaciones</div>
      </div>
      <div class="btn-arrow">›</div>
    </button>

    <button class="planilla-btn yellow" onclick="openPlanilla('unificada')">
      <div class="btn-icon">🗂️</div>
      <div class="btn-text">
        <div class="btn-name">PLANILLA UNIFICADA</div>
        <div class="btn-desc">Vista consolidada de datos</div>
      </div>
      <div class="btn-arrow">›</div>
    </button>

    <button class="planilla-btn red" onclick="openPlanilla('lector')">
      <div class="btn-icon">🤖</div>
      <div class="btn-text">
        <div class="btn-name">LECTOR IA</div>
        <div class="btn-desc">Análisis inteligente de reportes</div>
      </div>
      <div class="btn-arrow">›</div>
    </button>

    <button class="planilla-btn" style="--color:#00e5ff" onclick="openPlanilla('satelite')">
      <div class="btn-icon" style="background:rgba(0,229,255,0.12);border:1px solid rgba(0,229,255,0.25)">🛰️</div>
      <div class="btn-text">
        <div class="btn-name">SATÉLITE</div>
        <div class="btn-desc">Chequeo neto panel vs billetera</div>
      </div>
      <div class="btn-arrow">›</div>
    </button>

  </div>
</div>

<!-- ── VISTA PLANILLA ── -->
<div id="planilla-view">
  <div class="plnav">
    <button class="back-btn" onclick="closePlanilla()">
      ‹ VOLVER
    </button>
    <div class="plnav-title" id="plnav-title">—</div>
    <div class="plnav-dot" id="plnav-dot"></div>
  </div>

  <div class="frame-loading" id="frame-loading">
    <div class="spinner"></div>
    <div class="loading-text">CARGANDO...</div>
  </div>

  <iframe id="planilla-frame" src="about:blank"></iframe>
</div>

<script>
const URLS = {
  turnos:    'turnos_v10.html',
  negra:     'index.html',
  unificada: 'planilla_control_UNIFICADA_v4.html',
  lector:    'lector_reportes.html',
  satelite:  'satelite_chequeo.html',
};

const LABELS = {
  turnos:    'CONTROL DE TURNOS',
  negra:     'PLANILLA DE CONTROL',
  unificada: 'PLANILLA UNIFICADA',
  lector:    'LECTOR IA',
  satelite:  'SATÉLITE — CHEQUEO NETO',
};

const COLORS = {
  turnos:    '#00c6a2',
  negra:     '#1a6bff',
  unificada: '#FFD600',
  lector:    '#ff4757',
  satelite:  '#00e5ff',
};

function openPlanilla(key) {
  const view = document.getElementById('planilla-view');
  const frame = document.getElementById('planilla-frame');
  const title = document.getElementById('plnav-title');
  const dot = document.getElementById('plnav-dot');
  const loading = document.getElementById('frame-loading');

  title.textContent = LABELS[key];
  dot.style.background = COLORS[key];
  dot.style.boxShadow = `0 0 6px ${COLORS[key]}`;

  view.classList.add('open');
  document.getElementById('home').style.display = 'none';

  // Si ya está cargada la misma planilla, no recargar
  if(frame.src && frame.src.includes(URLS[key])){
    loading.classList.add('hidden');
  } else {
    loading.classList.remove('hidden');
    setTimeout(() => {
      frame.src = URLS[key];
      frame.onload = () => {
        loading.classList.add('hidden');
      };
    }, 200);
  }

  // Prevenir scroll del body
  document.body.style.overflow = 'hidden';
}

function closePlanilla() {
  const view = document.getElementById('planilla-view');
  // NO limpiar frame.src para preservar localStorage del iframe
  view.classList.remove('open');
  document.getElementById('home').style.display = 'flex';
  document.body.style.overflow = '';
}

// Botón atrás del celular
window.addEventListener('popstate', () => {
  const view = document.getElementById('planilla-view');
  if (view.classList.contains('open')) {
    closePlanilla();
  }
});

// Agregar entrada al historial al abrir
const origOpen = window.openPlanilla;

// Clock
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock-home').textContent = `${h}:${m}:${s}`;
}
setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
