<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Turnos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1e28;
    --border: #252a38;
    --accent-m: #f59e0b;
    --accent-t: #38bdf8;
    --accent-n: #a78bfa;
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
    --green: #34d399;
    --red: #f87171;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0d1117 0%, #12151c 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent-m), var(--accent-t));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-date {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── AGENCY TABS ── */
  .agency-nav {
    display: flex;
    gap: 4px;
    padding: 16px 32px 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--surface);
  }
  .agency-nav::-webkit-scrollbar { display: none; }

  .ag-tab {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    padding: 10px 22px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: var(--radius) var(--radius) 0 0;
    border: 1px solid transparent;
    border-bottom: none;
    transition: all 0.2s;
    white-space: nowrap;
    position: relative;
    bottom: -1px;
  }
  .ag-tab:hover {
    color: var(--text-dim);
    background: var(--surface2);
  }
  .ag-tab.active {
    color: var(--accent-m);
    background: var(--bg);
    border-color: var(--border);
    border-bottom-color: var(--bg);
  }
  .ag-tab.mono-tab.active { color: var(--accent-n); }
  .ag-tab.reporte-tab.active { color: #f472b6; }

  /* ── REPORTE ── */
  .reporte-wrap {
    padding: 28px 32px;
    animation: fadeIn 0.25s ease;
  }
  .reporte-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .reporte-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(90deg, #f472b6, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .reporte-date-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .reporte-copy-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    border: none;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(124,58,237,.35);
  }
  .reporte-copy-btn:hover {
    background: linear-gradient(135deg, #6d28d9, #5b21b6);
    transform: translateY(-1px);
  }

  /* preview card tipo WhatsApp/Telegram */
  .reporte-preview {
    background: #1a1f2e;
    border: 1px solid #2d3452;
    border-radius: 16px;
    padding: 24px 28px;
    max-width: 420px;
    margin: 0 auto 32px;
    font-family: 'DM Sans', sans-serif;
    position: relative;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  .reporte-preview::before {
    content: '● ● ●';
    position: absolute;
    top: 14px;
    left: 20px;
    font-size: 10px;
    color: #3d4460;
    letter-spacing: 4px;
  }
  .reporte-msg {
    margin-top: 12px;
    white-space: pre-wrap;
    font-size: 15px;
    line-height: 1.9;
    color: #e8eaf0;
    letter-spacing: 0.3px;
  }
  .reporte-msg .msg-fecha    { color: #f472b6; font-weight: 700; font-size: 16px; }
  .reporte-msg .msg-agencia  { color: #a78bfa; font-weight: 700; font-size: 15px; margin-top: 4px; display: block; }
  .reporte-msg .msg-turno    { color: #94a3b8; font-size: 13px; }
  .reporte-msg .msg-ok       { color: #34d399; font-weight: 600; }
  .reporte-msg .msg-pos      { color: #34d399; font-weight: 700; }
  .reporte-msg .msg-neg      { color: #f87171; font-weight: 700; }

  /* tabla de agencias */
  .reporte-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    margin-top: 24px;
  }
  .reporte-ag-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .reporte-ag-card:hover { border-color: #3a4258; }
  .reporte-ag-title {
    background: linear-gradient(90deg, #1a1f2e, #252a3a);
    padding: 10px 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    letter-spacing: 2px;
    color: #a78bfa;
    border-bottom: 1px solid var(--border);
  }
  .reporte-ag-rows { padding: 8px 0; }
  .reporte-ag-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 16px;
    border-bottom: 1px solid rgba(255,255,255,.04);
    font-size: 13px;
  }
  .reporte-ag-row:last-child { border-bottom: none; }
  .reporte-turno-label {
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    width: 32px;
  }
  .t-m { color: var(--accent-m); }
  .t-t { color: var(--accent-t); }
  .t-n { color: var(--accent-n); }
  .reporte-op { color: var(--text-muted); font-size: 12px; flex: 1; padding: 0 10px; }
  .reporte-liq-ok  { color: #34d399; font-weight: 700; font-size: 13px; }
  .reporte-liq-pos { color: #34d399; font-weight: 700; font-size: 13px; }
  .reporte-liq-neg { color: #f87171; font-weight: 700; font-size: 13px; }
  .reporte-liq-nd  { color: #4b5563; font-size: 12px; }

  /* ── CONTENT AREA ── */
  .content {
    padding: 28px 32px;
    display: none;
    animation: fadeIn 0.25s ease;
  }
  .content.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── DATE NAV ── */
  .date-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .date-nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 7px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
  }
  .date-nav-btn:hover { background: var(--surface2); color: var(--text); }

  .date-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--text);
    min-width: 220px;
    text-align: center;
  }

  /* ── DAY INPUT ── */
  .day-input-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }

  /* ── TURNO CARD ── */
  .turno-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .turno-card:hover { border-color: #3a4258; }

  .turno-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .turno-header.manana { background: linear-gradient(90deg, rgba(245,158,11,.15), transparent); }
  .turno-header.tarde  { background: linear-gradient(90deg, rgba(56,189,248,.15), transparent); }
  .turno-header.noche  { background: linear-gradient(90deg, rgba(167,139,250,.15), transparent); }

  .turno-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
  }
  .manana .turno-title { color: var(--accent-m); }
  .tarde  .turno-title { color: var(--accent-t); }
  .noche  .turno-title { color: var(--accent-n); }

  .turno-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .turno-time {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .turno-operador input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 6px;
    width: 110px;
    outline: none;
    transition: border-color 0.2s;
  }
  .turno-operador input:focus { border-color: #4a5470; }
  .turno-operador input::placeholder { color: var(--text-muted); }

  /* ── GRID INSIDE CARD ── */
  .turno-body {
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .col-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .col-label.plus  { color: var(--green); }
  .col-label.minus { color: var(--red); }

  .field-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 7px;
    gap: 8px;
  }
  .field-name {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 100px;
  }
  .field-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 6px;
    width: 100%;
    text-align: right;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .field-input:focus {
    border-color: #4a5470;
    background: #1f2433;
  }
  .field-input::placeholder { color: #3d4460; }

  .label-input {
    background: transparent;
    border: none;
    border-bottom: 1px dashed #3d4460;
    color: var(--accent-m);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 4px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s, color 0.2s;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .label-input:focus {
    border-bottom-color: var(--accent-m);
    color: #fff;
  }
  .label-input::placeholder { color: #3d4460; font-style: italic; text-transform: none; }
  .turno-card.tarde .label-input         { color: var(--accent-t); }
  .turno-card.tarde .label-input:focus   { border-bottom-color: var(--accent-t); }
  .turno-card.noche .label-input         { color: var(--accent-n); }
  .turno-card.noche .label-input:focus   { border-bottom-color: var(--accent-n); }

  .field-name-wrap {
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    min-width: 120px;
    max-width: 140px;
  }
  .editable-badge {
    font-size: 9px;
    color: #3d4460;
    letter-spacing: 0.5px;
    margin-bottom: 1px;
  }

  /* ── TOTALES ── */
  .turno-footer {
    padding: 12px 18px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .total-box {
    text-align: center;
  }
  .total-box label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    display: block;
    margin-bottom: 4px;
  }
  .total-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
  }
  .total-val.plus  { color: var(--green); }
  .total-val.minus { color: var(--red); }
  .total-val.liq   { color: var(--accent-m); }
  .turno-card.tarde  .total-val.liq { color: var(--accent-t); }
  .turno-card.noche  .total-val.liq { color: var(--accent-n); }

  /* ── DAILY SUMMARY ── */
  .day-summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    margin-top: 24px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    align-items: center;
  }
  .summary-item label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    display: block;
    margin-bottom: 6px;
  }
  .summary-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 1px;
  }
  .summary-val.positive { color: var(--green); }
  .summary-val.negative { color: var(--red); }
  .summary-val.neutral  { color: var(--text); }

  .summary-divider {
    height: 40px;
    width: 1px;
    background: var(--border);
    justify-self: center;
  }

  /* ── EMPTY STATE ── */
  .empty-agency {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }
  .empty-agency .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-agency h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    margin-bottom: 8px;
    color: var(--text-dim);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .day-input-row { grid-template-columns: 1fr; }
    .day-summary { grid-template-columns: 1fr 1fr; }
    .content { padding: 20px 16px; }
    .agency-nav { padding: 12px 16px 0; }
    header { padding: 14px 16px; }
  }
  @media (max-width: 600px) {
    .turno-body { grid-template-columns: 1fr; }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .download-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #16a34a, #15803d);
    border: none;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(22,163,74,.35);
  }
  .download-btn:hover {
    background: linear-gradient(135deg, #15803d, #166534);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(22,163,74,.45);
  }
  .download-btn:active { transform: translateY(0); }
  .dl-icon { font-size: 15px; }

  .backup-btn, .restore-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .backup-btn {
    background: linear-gradient(135deg, #1d4ed8, #1e40af);
    color: #fff;
    box-shadow: 0 2px 8px rgba(29,78,216,.35);
  }
  .backup-btn:hover { background: linear-gradient(135deg, #1e40af, #1e3a8a); transform: translateY(-1px); }
  .restore-btn {
    background: linear-gradient(135deg, #b45309, #92400e);
    color: #fff;
    box-shadow: 0 2px 8px rgba(180,83,9,.35);
  }
  .restore-btn:hover { background: linear-gradient(135deg, #92400e, #78350f); transform: translateY(-1px); }

  /* ── TURNO DOWNLOAD BTN ── */
  .turno-dl-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: transparent;
    border: 1px solid rgba(255,255,255,.15);
    color: rgba(255,255,255,.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 5px 11px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .turno-dl-btn:hover { background: rgba(255,255,255,.08); transform: translateY(-1px); }
  .turno-dl-btn:active { transform: translateY(0); }
  .manana .turno-dl-btn { border-color: rgba(245,158,11,.5); color: var(--accent-m); }
  .tarde  .turno-dl-btn { border-color: rgba(56,189,248,.5);  color: var(--accent-t); }
  .noche  .turno-dl-btn { border-color: rgba(167,139,250,.5); color: var(--accent-n); }
  .manana .turno-dl-btn:hover { background: rgba(245,158,11,.1); }
  .tarde  .turno-dl-btn:hover { background: rgba(56,189,248,.1); }
  .noche  .turno-dl-btn:hover { background: rgba(167,139,250,.1); }

  .save-toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green);
    color: #0a0c10;
    font-weight: 600;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 8px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .save-toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── OBSERVACIONES ── */
  .turno-obs {
    padding: 12px 18px 16px;
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,.015);
  }
  .turno-obs-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .turno-obs-label::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: .6;
  }
  .turno-card.manana .turno-obs-label { color: var(--accent-m); }
  .turno-card.tarde  .turno-obs-label { color: var(--accent-t); }
  .turno-card.noche  .turno-obs-label { color: var(--accent-n); }

  .obs-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    line-height: 1.6;
    padding: 10px 12px;
    border-radius: 8px;
    resize: vertical;
    min-height: 70px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .obs-textarea:focus {
    border-color: #4a5470;
    background: #1f2433;
  }
  .obs-textarea::placeholder { color: #3d4460; font-style: italic; }

  /* ── INICIO/FIN TIME ── */
  .time-row {
    display: flex;
    gap: 10px;
    padding: 10px 18px;
    background: rgba(255,255,255,.02);
    border-bottom: 1px solid var(--border);
  }
  .time-field {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .time-field label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
  }
  .time-field input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 6px;
    width: 90px;
    outline: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Control de Turnos</div>
  <div class="header-right">
    <div class="header-date" id="headerDate"></div>
    <button class="backup-btn" onclick="exportarDatos()" title="Guardar copia de seguridad">💾 Guardar Datos</button>
    <button class="restore-btn" onclick="document.getElementById('importFile').click()" title="Cargar copia de seguridad">📂 Cargar Datos</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importarDatos(event)">
    <button class="download-btn" id="downloadBtn" onclick="downloadExcel()">
      <span class="dl-icon">⬇</span> Descargar Excel
    </button>
  </div>
</header>

<!-- AGENCY TABS -->
<nav class="agency-nav" id="agencyNav"></nav>

<!-- CONTENT PANELS -->
<div id="contentPanels"></div>

<!-- TOAST -->
<div class="save-toast" id="saveToast">✓ Guardado</div>

<script type="module">
// ── Firebase ──
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const _fbApp = initializeApp({
  apiKey: "AIzaSyCGRYyo9EmR0NB3TImzZIP4SuDpDwwMgVc",
  authDomain: "planilla-perdidas---ganancias.firebaseapp.com",
  projectId: "planilla-perdidas---ganancias",
  storageBucket: "planilla-perdidas---ganancias.firebasestorage.app",
  messagingSenderId: "179047310261",
  appId: "1:179047310261:web:2e5ad044d98751985d2ffc"
});
const _db = getFirestore(_fbApp);

async function saveAgencyToFirebase(ag) {
  try {
    await setDoc(doc(_db,'turnosData', ag.replace(/ /g,'_')), { data: JSON.stringify(appData[ag]||{}) });
  } catch(e) { console.warn('Firebase save error:', ag, e); }
}

async function loadAllFromFirebase() {
  try {
    const AGS = ['AG 18','AG 19','AG 21','AG 22','AG 23','AG 24','AG 25','SIEMPRE MONO'];
    await Promise.all(AGS.map(async ag => {
      const snap = await getDoc(doc(_db,'turnosData', ag.replace(/ /g,'_')));
      if (snap.exists()) appData[ag] = JSON.parse(snap.data().data || '{}');
    }));
    localStorage.setItem('turnosData', JSON.stringify(appData));
    return true;
  } catch(e) { console.warn('Firebase load error:', e); return false; }
}

const AGENCIES = ['AG 18','AG 19','AG 21','AG 22','AG 23','AG 24','AG 25','SIEMPRE MONO'];
const ALL_TABS  = [...AGENCIES, 'REPORTE'];

// Fields for FICHAS+ (entradas) and BILLETERAS- (salidas)
const FIELDS_IN = [
  { id:'fichas',       label:'FICHAS' },
  { id:'astropay',     label:'ASTROPAY' },
  { id:'prex',         label:'PREX' },
  { id:'personal',     label:'PERSONAL' },
  { id:'claro',        label:'CLARO' },
  { id:'pago_pend',    label:'PAGO PENDIENTE' },
  { id:'baja_fichas',  label:'BAJA FICHAS T.N.' },
  { id:'transf',       label:'TRANSF CH 18' },
  { id:'colab_rec',    label:'COLAB. RECIBIDAS', editableLabel: true },
  { id:'carga_fichas', label:'CARGA DE FICHAS',  editableLabel: true },
];
const FIELDS_OUT = [
  { id:'fichas_out',   label:'FICHAS' },
  { id:'astropay_out', label:'ASTROPAY' },
  { id:'prex_out',     label:'PREX' },
  { id:'personal_out', label:'PERSONAL' },
  { id:'bonos',        label:'BONOS' },
  { id:'descartes',    label:'DESCARTES' },
  { id:'colab_pag',    label:'COLAB. PAGADAS' },
  { id:'pago_otros',   label:'PAGO OTROS TURNOS',  editableLabel: true },
  { id:'carga_otros',  label:'CARGA OTROS TURNOS', editableLabel: true },
  { id:'retiro',       label:'RETIRO DE FICHAS' },
  { id:'sueldo',       label:'SUELDO' },
];

const TURNOS = [
  { key:'manana', label:'TURNO MAÑANA',  cls:'manana', defaultStart:'06:00', defaultEnd:'14:00' },
  { key:'tarde',  label:'TURNO TARDE',   cls:'tarde',  defaultStart:'14:00', defaultEnd:'22:00' },
  { key:'noche',  label:'TURNO NOCHE',   cls:'noche',  defaultStart:'22:00', defaultEnd:'06:00' },
];

// State: data[agency][dateKey][turno][fieldId] = value
let appData = {};
let currentAgency = AGENCIES[0];

// Date navigation per agency
let agencyDates = {};
AGENCIES.forEach(ag => {
  agencyDates[ag] = new Date(2026, 2, 8); // 8 marzo 2026 = domingo
});
let reporteDate = new Date(2026, 2, 8);

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDateLabel(d) {
  const dias = ['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];
  const meses = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
  return `${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]} ${d.getFullYear()}`;
}

function ensureData(ag, dk, turno) {
  if (!appData[ag]) appData[ag] = {};
  if (!appData[ag][dk]) appData[ag][dk] = {};
  if (!appData[ag][dk][turno]) {
    appData[ag][dk][turno] = { operador:'', inicio:'', fin:'', obs:'' };
    [...FIELDS_IN, ...FIELDS_OUT].forEach(f => {
      appData[ag][dk][turno][f.id] = '';
      if (f.editableLabel) appData[ag][dk][turno][f.id + '_label'] = '';
    });
  }
}

function getData(ag, dk, turno, field) {
  ensureData(ag, dk, turno);
  return appData[ag][dk][turno][field] || '';
}
function setData(ag, dk, turno, field, val) {
  ensureData(ag, dk, turno);
  appData[ag][dk][turno][field] = val;
}

function numVal(v) {
  const n = parseFloat(String(v).replace(/[^0-9.\-]/g,''));
  return isNaN(n) ? 0 : n;
}
function formatNum(n) {
  if (n === 0) return '-';
  return n.toLocaleString('es-AR');
}

function calcTotals(ag, dk, turno) {
  const totalIn  = FIELDS_IN.reduce((s,f) => s + numVal(getData(ag,dk,turno,f.id)), 0);
  const totalOut = FIELDS_OUT.reduce((s,f) => s + numVal(getData(ag,dk,turno,f.id)), 0);
  return { totalIn, totalOut, liq: totalIn - totalOut };
}

// ──────────────────────────────────────
// BUILD UI
// ──────────────────────────────────────
// ──────────────────────────────────────
// REPORTE
// ──────────────────────────────────────

function liqLabel(liq) {
  if (liq === 0) return { text: 'OK', cls: 'reporte-liq-ok' };
  const fmt = Math.abs(liq).toLocaleString('es-AR');
  return liq > 0
    ? { text: `+$${fmt}`, cls: 'reporte-liq-pos' }
    : { text: `-$${fmt}`, cls: 'reporte-liq-neg' };
}

function liqLabelPlain(liq) {
  if (liq === 0) return 'OK';
  const fmt = Math.abs(liq).toLocaleString('es-AR');
  return liq > 0 ? `+$${fmt}` : `-$${fmt}`;
}

function renderReporte() {
  const panels = document.getElementById('contentPanels');
  panels.innerHTML = '';
  document.getElementById('headerDate').textContent = formatDateLabel(reporteDate);

  const dk = dateKey(reporteDate);
  const [y,m,d] = dk.split('-');
  const fechaCorta = `${String(d).padStart(2,'0')} - ${['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'][+m-1]}`;

  // Construir texto del reporte
  function buildReporteText() {
    let txt = `REPORTE DEL\n${fechaCorta}\n`;
    AGENCIES.forEach(ag => {
      const hasSomeData = TURNOS.some(t => {
        const totalIn  = FIELDS_IN.reduce((s,f)  => s + numVal(getData(ag,dk,t.key,f.id)), 0);
        const totalOut = FIELDS_OUT.reduce((s,f) => s + numVal(getData(ag,dk,t.key,f.id)), 0);
        return totalIn > 0 || totalOut > 0;
      });
      if (!hasSomeData) return;
      txt += `\n${ag}\n`;
      TURNOS.forEach(t => {
        const prefix = { manana:'TM', tarde:'TT', noche:'TN' }[t.key];
        const totalIn  = FIELDS_IN.reduce((s,f)  => s + numVal(getData(ag,dk,t.key,f.id)), 0);
        const totalOut = FIELDS_OUT.reduce((s,f) => s + numVal(getData(ag,dk,t.key,f.id)), 0);
        const hasData  = totalIn > 0 || totalOut > 0;
        const liq      = totalIn - totalOut;
        txt += `${prefix} ${hasData ? liqLabelPlain(liq) : 'OK'}\n`;
      });
    });
    return txt.trim();
  }

  const wrap = document.createElement('div');
  wrap.className = 'reporte-wrap';

  // Header
  wrap.innerHTML = `
    <div class="reporte-header">
      <div class="reporte-title">📋 REPORTE DIARIO</div>
      <div class="reporte-date-nav">
        <button class="date-nav-btn" id="repPrev">◀</button>
        <div class="date-label">${formatDateLabel(reporteDate)}</div>
        <button class="date-nav-btn" id="repNext">▶</button>
      </div>
      <button class="reporte-copy-btn" id="repCopy">📋 Copiar Reporte</button>
    </div>

    <div style="display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start;">

      <!-- PREVIEW MENSAJE -->
      <div class="reporte-preview">
        <div class="reporte-msg" id="reporteMsg"></div>
      </div>

      <!-- TABLA DE AGENCIAS -->
      <div style="flex:1; min-width:280px;">
        <div class="reporte-grid" id="reporteGrid"></div>
      </div>

    </div>
  `;
  panels.appendChild(wrap);

  // Navegación fechas
  wrap.querySelector('#repPrev').onclick = () => {
    reporteDate = new Date(reporteDate.getTime() - 86400000);
    renderReporte();
  };
  wrap.querySelector('#repNext').onclick = () => {
    reporteDate = new Date(reporteDate.getTime() + 86400000);
    renderReporte();
  };

  // Copiar al portapapeles
  wrap.querySelector('#repCopy').onclick = () => {
    const txt = buildReporteText();
    navigator.clipboard.writeText(txt).then(() => {
      const t = document.getElementById('saveToast');
      t.textContent = '✓ Reporte copiado';
      t.classList.add('show');
      setTimeout(() => { t.classList.remove('show'); t.textContent = '✓ Guardado'; }, 2000);
    });
  };

  // Llenar preview mensaje
  const msgEl = wrap.querySelector('#reporteMsg');
  let html = `<span class="msg-fecha">REPORTE DEL\n${fechaCorta}</span>`;

  AGENCIES.forEach(ag => {
    const hasSomeData = TURNOS.some(t => {
      const ti = FIELDS_IN.reduce((s,f)  => s + numVal(getData(ag,dk,t.key,f.id)), 0);
      const to = FIELDS_OUT.reduce((s,f) => s + numVal(getData(ag,dk,t.key,f.id)), 0);
      return ti > 0 || to > 0;
    });
    if (!hasSomeData) return;

    html += `\n<span class="msg-agencia">${ag}</span>`;
    TURNOS.forEach(t => {
      const prefix   = { manana:'TM', tarde:'TT', noche:'TN' }[t.key];
      const totalIn  = FIELDS_IN.reduce((s,f)  => s + numVal(getData(ag,dk,t.key,f.id)), 0);
      const totalOut = FIELDS_OUT.reduce((s,f) => s + numVal(getData(ag,dk,t.key,f.id)), 0);
      const hasData  = totalIn > 0 || totalOut > 0;
      const liq      = totalIn - totalOut;
      const { text, cls } = liqLabel(hasData ? liq : 0);
      html += `\n<span class="msg-turno">${prefix} </span><span class="${cls}">${text}</span>`;
    });
  });

  msgEl.innerHTML = html;

  // Llenar grid de agencias
  const grid = wrap.querySelector('#reporteGrid');
  AGENCIES.forEach(ag => {
    const card = document.createElement('div');
    card.className = 'reporte-ag-card';

    let rowsHtml = '';
    TURNOS.forEach(t => {
      const prefix   = { manana:'TM', tarde:'TT', noche:'TN' }[t.key];
      const tCls     = { manana:'t-m', tarde:'t-t', noche:'t-n' }[t.key];
      const operador = getData(ag, dk, t.key, 'operador');
      const totalIn  = FIELDS_IN.reduce((s,f)  => s + numVal(getData(ag,dk,t.key,f.id)), 0);
      const totalOut = FIELDS_OUT.reduce((s,f) => s + numVal(getData(ag,dk,t.key,f.id)), 0);
      const hasData  = totalIn > 0 || totalOut > 0;
      const liq      = totalIn - totalOut;
      const { text, cls } = liqLabel(hasData ? liq : 0);

      rowsHtml += `
        <div class="reporte-ag-row">
          <span class="reporte-turno-label ${tCls}">${prefix}</span>
          <span class="reporte-op">${operador || '—'}</span>
          <span class="${cls}">${text}</span>
        </div>`;
    });

    card.innerHTML = `
      <div class="reporte-ag-title">${ag}</div>
      <div class="reporte-ag-rows">${rowsHtml}</div>`;
    grid.appendChild(card);
  });
}

// ──────────────────────────────────────
// BUILD NAV
// ──────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('agencyNav');
  nav.innerHTML = '';
  ALL_TABS.forEach(ag => {
    const btn = document.createElement('button');
    let cls = 'ag-tab';
    if (ag === 'SIEMPRE MONO') cls += ' mono-tab';
    if (ag === 'REPORTE')      cls += ' reporte-tab';
    if (ag === currentAgency)  cls += ' active';
    btn.className = cls;
    btn.textContent = ag;
    btn.onclick = () => { currentAgency = ag; buildNav(); renderContent(); };
    nav.appendChild(btn);
  });
}

function renderContent() {
  if (currentAgency === 'REPORTE') { renderReporte(); return; }

  const panels = document.getElementById('contentPanels');
  panels.innerHTML = '';

  const ag = currentAgency;
  const d  = agencyDates[ag];
  const dk = dateKey(d);

  const div = document.createElement('div');
  div.className = 'content active';

  // Date nav
  div.innerHTML = `
    <div class="date-nav">
      <button class="date-nav-btn" id="prevDay">◀</button>
      <div class="date-label">${formatDateLabel(d)}</div>
      <button class="date-nav-btn" id="nextDay">▶</button>
    </div>
    <div class="day-input-row" id="turnosRow"></div>
    <div class="day-summary" id="daySummary"></div>
  `;
  panels.appendChild(div);

  div.querySelector('#prevDay').onclick = () => {
    agencyDates[ag] = new Date(d.getTime() - 86400000);
    renderContent();
  };
  div.querySelector('#nextDay').onclick = () => {
    agencyDates[ag] = new Date(d.getTime() + 86400000);
    renderContent();
  };

  const row = div.querySelector('#turnosRow');
  TURNOS.forEach(t => {
    row.appendChild(buildTurnoCard(ag, dk, t));
  });

  updateSummary(ag, dk, div.querySelector('#daySummary'));

  // Header date
  document.getElementById('headerDate').textContent = formatDateLabel(d);
}

function buildTurnoCard(ag, dk, turno) {
  ensureData(ag, dk, turno.key);
  const card = document.createElement('div');
  card.className = `turno-card ${turno.cls}`;
  card.id = `card-${ag}-${dk}-${turno.key}`.replace(/\s/g,'_');

  // Header
  const hdr = document.createElement('div');
  hdr.className = `turno-header ${turno.cls}`;
  hdr.innerHTML = `
    <div class="turno-title">${turno.label}</div>
    <div class="turno-meta">
      <div class="turno-operador">
        <input type="text" placeholder="Operador" value="${getData(ag,dk,turno.key,'operador')}"
          data-field="operador" />
      </div>
      <button class="turno-dl-btn" title="Descargar este turno en Excel">⬇ XLS</button>
    </div>
  `;
  card.appendChild(hdr);

  // Time row
  const timeRow = document.createElement('div');
  timeRow.className = 'time-row';
  timeRow.innerHTML = `
    <div class="time-field">
      <label>INICIO</label>
      <input type="time" value="${getData(ag,dk,turno.key,'inicio') || turno.defaultStart}" data-field="inicio" />
    </div>
    <div class="time-field">
      <label>FIN</label>
      <input type="time" value="${getData(ag,dk,turno.key,'fin') || turno.defaultEnd}" data-field="fin" />
    </div>
  `;
  card.appendChild(timeRow);

  // Body
  const body = document.createElement('div');
  body.className = 'turno-body';

  function buildFieldRow(f, ag, dk, turnoKey) {
    const row = document.createElement('div');
    row.className = 'field-row';
    const savedLabel = f.editableLabel ? (getData(ag, dk, turnoKey, f.id + '_label') || '') : '';
    if (f.editableLabel) {
      row.innerHTML = `
        <div class="field-name-wrap">
          <span class="editable-badge">✏ nombre</span>
          <input class="label-input" type="text" placeholder="${f.label}"
            value="${savedLabel}" data-field="${f.id}_label" />
        </div>
        <input class="field-input" type="text" inputmode="numeric"
          placeholder="0" value="${getData(ag,dk,turnoKey,f.id)}"
          data-field="${f.id}" />
      `;
    } else {
      row.innerHTML = `
        <span class="field-name">${f.label}</span>
        <input class="field-input" type="text" inputmode="numeric"
          placeholder="0" value="${getData(ag,dk,turnoKey,f.id)}"
          data-field="${f.id}" />
      `;
    }
    return row;
  }

  // COL IN
  const colIn = document.createElement('div');
  colIn.innerHTML = `<div class="col-label plus">FICHAS + (Entradas)</div>`;
  FIELDS_IN.forEach(f => colIn.appendChild(buildFieldRow(f, ag, dk, turno.key)));
  body.appendChild(colIn);

  // COL OUT
  const colOut = document.createElement('div');
  colOut.innerHTML = `<div class="col-label minus">BILLETERAS - (Salidas)</div>`;
  FIELDS_OUT.forEach(f => colOut.appendChild(buildFieldRow(f, ag, dk, turno.key)));
  body.appendChild(colOut);
  card.appendChild(body);

  // Footer totals
  const footer = document.createElement('div');
  footer.className = 'turno-footer';
  footer.id = `footer-${ag}-${dk}-${turno.key}`.replace(/\s/g,'_');
  card.appendChild(footer);
  updateFooter(ag, dk, turno.key, footer);

  // Events
  card.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', () => {
      const field = inp.dataset.field;
      setData(ag, dk, turno.key, field, inp.value);
      updateFooter(ag, dk, turno.key, card.querySelector(`#footer-${ag}-${dk}-${turno.key}`.replace(/\s/g,'_')));
      const summary = document.getElementById('daySummary');
      if (summary) updateSummary(ag, dk, summary);
      saveToStorage(ag);
    });
  });

  // Individual download button
  hdr.querySelector('.turno-dl-btn').addEventListener('click', () => {
    downloadTurnoExcel(ag, dk, turno);
  });

  // Observaciones
  const obsSection = document.createElement('div');
  obsSection.className = 'turno-obs';
  obsSection.innerHTML = `
    <div class="turno-obs-label">Observaciones</div>
    <textarea class="obs-textarea" placeholder="Anotá cualquier novedad del turno..."
      data-field="obs">${getData(ag, dk, turno.key, 'obs')}</textarea>
  `;
  card.appendChild(obsSection);

  // Events (obs textarea included via re-query)
  obsSection.querySelector('.obs-textarea').addEventListener('input', function() {
    setData(ag, dk, turno.key, 'obs', this.value);
    saveToStorage(ag);
  });

  return card;
}

function updateFooter(ag, dk, turnoKey, footer) {
  if (!footer) return;
  const { totalIn, totalOut, liq } = calcTotals(ag, dk, turnoKey);
  footer.innerHTML = `
    <div class="total-box">
      <label>TOTAL ENTRADAS</label>
      <div class="total-val plus">${formatNum(totalIn)}</div>
    </div>
    <div class="total-box">
      <label>TOTAL SALIDAS</label>
      <div class="total-val minus">${formatNum(totalOut)}</div>
    </div>
    <div class="total-box">
      <label>LIQUIDACIÓN</label>
      <div class="total-val liq">${liq >= 0 ? '+' : ''}${formatNum(liq)}</div>
    </div>
  `;
}

function updateSummary(ag, dk, container) {
  if (!container) return;
  let totalIn = 0, totalOut = 0, totalLiq = 0;
  TURNOS.forEach(t => {
    const c = calcTotals(ag, dk, t.key);
    totalIn  += c.totalIn;
    totalOut += c.totalOut;
    totalLiq += c.liq;
  });
  const cls = totalLiq >= 0 ? 'positive' : 'negative';
  container.innerHTML = `
    <div class="summary-item">
      <label>TOTAL DÍA — ENTRADAS</label>
      <div class="summary-val positive">${formatNum(totalIn)}</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item">
      <label>TOTAL DÍA — SALIDAS</label>
      <div class="summary-val negative">${formatNum(totalOut)}</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item">
      <label>LIQUIDACIÓN TOTAL DÍA</label>
      <div class="summary-val ${cls}">${totalLiq >= 0 ? '+' : ''}${formatNum(totalLiq)}</div>
    </div>
    <div class="summary-item">
      <label>TURNOS CARGADOS</label>
      <div class="summary-val neutral">${TURNOS.filter(t => {
        ensureData(ag, dk, t.key);
        return FIELDS_IN.some(f => getData(ag,dk,t.key,f.id) !== '') ||
               FIELDS_OUT.some(f => getData(ag,dk,t.key,f.id) !== '');
      }).length} / 3</div>
    </div>
  `;
}

// ──────────────────────────────────────
// EXPORTAR / IMPORTAR DATOS (backup JSON)
// ──────────────────────────────────────
function exportarDatos() {
  const backup = {
    version: 1,
    fecha: new Date().toISOString(),
    appData,
    agencyDates: Object.fromEntries(AGENCIES.map(ag => [ag, agencyDates[ag].toISOString()])),
    reporteDate: reporteDate.toISOString(),
  };
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const now  = new Date();
  a.href     = url;
  a.download = `turnos_backup_${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);

  const t = document.getElementById('saveToast');
  t.textContent = '✓ Backup guardado';
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); t.textContent = '✓ Guardado'; }, 2500);
}

function importarDatos(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.appData) throw new Error('Archivo inválido');

      appData = backup.appData;

      if (backup.agencyDates) {
        AGENCIES.forEach(ag => {
          if (backup.agencyDates[ag]) {
            const fecha = new Date(backup.agencyDates[ag]);
            agencyDates[ag] = fecha.getFullYear() < 2026
              ? new Date(fecha.setFullYear(2026))
              : fecha;
          }
        });
      }
      if (backup.reporteDate) {
        reporteDate = new Date(backup.reporteDate);
        if (reporteDate.getFullYear() < 2026) reporteDate.setFullYear(2026);
      }

      // Guardar en localStorage también
      localStorage.setItem('turnosData', JSON.stringify(appData));
      localStorage.setItem('turnosDates', JSON.stringify(
        Object.fromEntries(AGENCIES.map(ag => [ag, agencyDates[ag].toISOString()]))
      ));

      buildNav();
      renderContent();

      // Save to Firebase as backup
      if (window._fbSaveAgency) {
        AGENCIES.forEach(ag => window._fbSaveAgency(ag));
      }

      const t = document.getElementById('saveToast');
      t.textContent = '✓ Datos cargados correctamente';
      t.classList.add('show');
      setTimeout(() => { t.classList.remove('show'); t.textContent = '✓ Guardado'; }, 3000);
    } catch(err) {
      alert('Error al cargar el archivo. Asegurate de seleccionar un backup válido (.json)');
    }
    // Reset input para poder cargar el mismo archivo de nuevo si hace falta
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ──────────────────────────────────────
// PERSISTENCE (localStorage)
// ──────────────────────────────────────
let saveTimer = null;
function saveToStorage(changedAgency) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem('turnosData', JSON.stringify(appData));
      localStorage.setItem('turnosDates', JSON.stringify(
        Object.fromEntries(AGENCIES.map(ag => [ag, agencyDates[ag].toISOString()]))
      ));
      showToast();
      // Also save to Firebase
      if (changedAgency && window._fbSaveAgency) {
        window._fbSaveAgency(changedAgency);
      } else if (window._fbSaveAgency) {
        AGENCIES.forEach(ag => window._fbSaveAgency(ag));
      }
    } catch(e) {}
  }, 600);
}

function loadFromStorage() {
  try {
    const d = localStorage.getItem('turnosData');
    if (d) appData = JSON.parse(d);
    const dt = localStorage.getItem('turnosDates');
    if (dt) {
      const parsed = JSON.parse(dt);
      AGENCIES.forEach(ag => {
        if (parsed[ag]) {
          const fecha = new Date(parsed[ag]);
          if (fecha.getFullYear() < 2026) {
            fecha.setFullYear(2026);
          }
          agencyDates[ag] = fecha;
        }
      });
    }
  } catch(e) {}
  // Try to load from Firebase (overwrites localStorage data if available)
  function tryFirebase() {
    if (window.loadAllFromFirebase) {
      window.loadAllFromFirebase().then(ok => {
        if (ok) {
          // Usar renderContent directamente en lugar de window.renderAll
          // por si window.renderAll todavia no esta asignado
          if (typeof renderContent === 'function') renderContent();
          else if (window.renderAll) window.renderAll();
        }
      });
    } else {
      setTimeout(tryFirebase, 600);
    }
  }
  // Esperar un tick para que el modulo termine de ejecutarse
  setTimeout(tryFirebase, 100);
}

function showToast() {
  const t = document.getElementById('saveToast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

function xlFill(rgb)  { return { patternType:'solid', fgColor:{ rgb } }; }
function xlFont(o)    { return { bold:o.bold||false, color:{ rgb:o.color||'FF000000' }, sz:o.sz||10, name:o.name||'Calibri', italic:o.italic||false }; }
function xlAlign(h='left',v='center',wrap=false) { return { horizontal:h, vertical:v, wrapText:wrap }; }
function side(style, rgb='FF999999') { return { style, color:{ rgb } }; }
function xlBorder(t,r,b,l) {
  return {
    top:    side(t||'thin'),
    right:  side(r||'thin'),
    bottom: side(b||'thin'),
    left:   side(l||'thin'),
  };
}
function xlBorderFull(style='thin', rgb='FFAAAAAA') {
  const s = side(style, rgb);
  return { top:s, right:s, bottom:s, left:s };
}
function xlBorderBottom(style='medium', rgb='FF555555') {
  return { bottom: side(style, rgb) };
}

// ══════════════════════════════════════════
// BUILD TURNO WORKSHEET — PLANTILLA PROFESIONAL
// ══════════════════════════════════════════
function buildTurnoWorksheet(ag, dk, turno) {
  const [y,m,d]  = dk.split('-');
  const dateObj  = new Date(+y, +m-1, +d);
  const DIAS     = ['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];
  const MESES    = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
  const dateLabel= `${DIAS[dateObj.getDay()]} ${d} DE ${MESES[+m-1]} ${y}`;
  const tk       = turno.key;
  const T        = THEME[tk];
  const operador = (getData(ag, dk, tk, 'operador') || '—').toUpperCase();
  const inicio   = getData(ag, dk, tk, 'inicio') || turno.defaultStart;
  const fin      = getData(ag, dk, tk, 'fin')    || turno.defaultEnd;
  const vIn      = FIELDS_IN.map(f  => numVal(getData(ag, dk, tk, f.id)));
  const vOut     = FIELDS_OUT.map(f => numVal(getData(ag, dk, tk, f.id)));
  const totalIn  = vIn.reduce((s,v)  => s+(v||0), 0);
  const totalOut = vOut.reduce((s,v) => s+(v||0), 0);
  const liqVal   = totalIn - totalOut;
  const maxLen   = Math.max(FIELDS_IN.length, FIELDS_OUT.length);

  const ws = {};
  const merges = [];
  const rowH = [];

  function sc(r, c, val, s, fmt) {
    const addr = XLSX.utils.encode_cell({r,c});
    ws[addr] = { v: val, t: typeof val==='number'?'n':'s', s };
    if (fmt)              ws[addr].z = fmt;
    else if (typeof val==='number') ws[addr].z = '#,##0';
  }
  function mg(r1,r2,c1,c2) { merges.push({s:{r:r1,c:c1},e:{r:r2,c:c2}}); }
  function rh(r, hpt)       { rowH[r] = {hpt}; }

  // ── COLUMNAS: A(índice) B(vacío) C(label in) D(monto in) E(label out) F(monto out) G(liq) ──
  // Total 7 cols (0–6)

  let R = 0; // row cursor

  // ┌─────────────────────────────────────────┐
  // │  ROW 0 — BANNER OSCURO CON NOMBRE AG    │
  // └─────────────────────────────────────────┘
  rh(R, 36);
  const bannerS = {
    font: xlFont({bold:true, sz:18, color:'FFFFFFFF'}),
    fill: xlFill(T.dark),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', T.dark),
  };
  for(let c=0;c<7;c++) sc(R,c,'',{fill:xlFill(T.dark), border:xlBorderFull('medium',T.dark)});
  sc(R, 0, `  CONTROL DE TURNOS  —  ${ag.toUpperCase()}`, bannerS);
  mg(R,R,0,6); R++;

  // ┌─────────────────────────────────────────┐
  // │  ROW 1 — ACENTO (color turno)           │
  // └─────────────────────────────────────────┘
  rh(R, 8);
  for(let c=0;c<7;c++) sc(R,c,'',{fill:xlFill(T.accent), border:{bottom:side('thin',T.accent)}});
  mg(R,R,0,6); R++;

  // ┌─────────────────────────────────────────┐
  // │  ROW 2 — TURNO + FECHA                  │
  // └─────────────────────────────────────────┘
  rh(R, 30);
  const turnoTitleS = {
    font: xlFont({bold:true, sz:16, color: T.dark}),
    fill: xlFill(T.accentL),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('thin','FFDDDDDD'),
  };
  const fechaS = {
    font: xlFont({bold:false, sz:12, color:'FF555555', italic:true}),
    fill: xlFill(T.accentL),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('thin','FFDDDDDD'),
  };
  sc(R, 0, `${T.icon}  ${turno.label.toUpperCase()}`, turnoTitleS);
  mg(R,R,0,3);
  sc(R, 4, dateLabel, fechaS);
  mg(R,R,4,6); R++;

  // ┌─────────────────────────────────────────┐
  // │  ROW 3 — INFO OPERADOR + HORARIO        │
  // └─────────────────────────────────────────┘
  rh(R, 22);
  const infoKeyS = {
    font: xlFont({bold:true, sz:10, color:'FFFFFFFF'}),
    fill: xlFill(T.sepBg),
    alignment: xlAlign('right','center'),
    border: xlBorderFull('thin', T.sepBg),
  };
  const infoValS = {
    font: xlFont({bold:true, sz:11, color: T.dark}),
    fill: xlFill(T.mid),
    alignment: xlAlign('left','center'),
    border: xlBorderFull('thin','FFCCCCCC'),
  };
  sc(R, 0, 'OPERADOR:', infoKeyS);
  mg(R,R,0,1);
  sc(R, 2, operador, infoValS);
  mg(R,R,2,3);
  sc(R, 4, `INICIO: ${inicio}`, infoValS);
  sc(R, 5, `FIN: ${fin}`, infoValS);
  mg(R,R,5,6); R++;

  // ┌─────────────────────────────────────────┐
  // │  ROW 4 — FILA VACÍA separador           │
  // └─────────────────────────────────────────┘
  rh(R, 6);
  for(let c=0;c<7;c++) sc(R,c,'',{fill:xlFill('FFFAFAFA')});
  mg(R,R,0,6); R++;

  // ┌─────────────────────────────────────────┐
  // │  ROW 5 — ENCABEZADOS DE SECCIONES       │
  // └─────────────────────────────────────────┘
  rh(R, 24);
  const secEmptyS = {fill:xlFill('FFF5F5F5'), border:xlBorderFull('thin','FFEEEEEE')};
  const secInS = {
    font: xlFont({bold:true, sz:12, color:'FFFFFFFF'}),
    fill: xlFill(T.inDark),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', T.inDark),
  };
  const secOutS = {
    font: xlFont({bold:true, sz:12, color:'FFFFFFFF'}),
    fill: xlFill(T.outDark),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', T.outDark),
  };
  const secLiqS = {
    font: xlFont({bold:true, sz:11, color:'FFFFFFFF'}),
    fill: xlFill(T.dark),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', T.dark),
  };
  sc(R,0,'#',    {font:xlFont({bold:true,sz:10,color:'FF888888'}), fill:xlFill('FFF0F0F0'), alignment:xlAlign('center','center'), border:xlBorderFull('thin','FFCCCCCC')});
  sc(R,1,'',     secEmptyS);
  sc(R,2,'⬆  CONCEPTO  (ENTRADAS)', secInS);
  mg(R,R,2,3);
  sc(R,4,'⬇  CONCEPTO  (SALIDAS)', secOutS);
  mg(R,R,4,5);
  sc(R,6,'LIQUIDACIÓN', secLiqS);
  R++;

  // ┌─────────────────────────────────────────┐
  // │  ROW 6 — sub-header montos              │
  // └─────────────────────────────────────────┘
  rh(R, 18);
  const subHdrBaseS = {font:xlFont({bold:true,sz:9,color:'FFFFFFFF'}), alignment:xlAlign('center','center')};
  sc(R,0,'',{fill:xlFill('FFF0F0F0'), border:xlBorderFull('thin','FFCCCCCC')});
  sc(R,1,'',{fill:xlFill('FFF0F0F0'), border:xlBorderFull('thin','FFCCCCCC')});
  sc(R,2,'CONCEPTO',    {...subHdrBaseS, fill:xlFill('FF2E7D32'), border:xlBorderFull('thin','FF1B5E20')});
  sc(R,3,'MONTO ($)',   {...subHdrBaseS, fill:xlFill('FF388E3C'), border:xlBorderFull('thin','FF1B5E20')});
  sc(R,4,'CONCEPTO',    {...subHdrBaseS, fill:xlFill('FFC62828'), border:xlBorderFull('thin','FFB71C1C')});
  sc(R,5,'MONTO ($)',   {...subHdrBaseS, fill:xlFill('FFD32F2F'), border:xlBorderFull('thin','FFB71C1C')});
  sc(R,6,'',            {...subHdrBaseS, fill:xlFill(T.dark),     border:xlBorderFull('thin',T.dark)});
  R++;

  // ┌─────────────────────────────────────────┐
  // │  ROWS 7..N — FILAS DE DATOS             │
  // └─────────────────────────────────────────┘
  const dataStartR = R;
  for (let i = 0; i < maxLen; i++) {
    rh(R, 17);
    const isAlt = i % 2 === 0;
    const fi = FIELDS_IN[i];
    const fo = FIELDS_OUT[i];
    const inVal  = fi ? (vIn[i]  || 0) : 0;
    const outVal = fo ? (vOut[i] || 0) : 0;
    const rowNum = i + 1;

    // A — número de fila
    sc(R,0, rowNum, {
      font: xlFont({sz:9, color:'FF888888'}),
      fill: xlFill(isAlt ? 'FFF5F5F5' : 'FFFFFFFF'),
      alignment: xlAlign('center','center'),
      border: xlBorderFull('thin','FFDDDDDD'),
    });
    // B — vacío separador
    sc(R,1,'',{fill:xlFill(isAlt?'FFF5F5F5':'FFFFFFFF'), border:xlBorderFull('thin','FFEEEEEE')});

    // C — label entrada (usa custom label si existe)
    const inLabelS = {
      font: xlFont({bold: inVal>0, sz:10, color: inVal>0 ? T.inDark : 'FF888888'}),
      fill: xlFill(isAlt ? T.inBg : T.inMid),
      alignment: xlAlign('left','center'),
      border: xlBorder('thin','thin','thin','medium'),
    };
    const inLabelText = fi ? (fi.editableLabel ? (getData(ag,dk,tk,fi.id+'_label') || fi.label) : fi.label) : '';
    sc(R,2, inLabelText, inLabelS);

    // D — monto entrada
    const inNumS = {
      font: xlFont({bold: inVal>0, sz:11, color: inVal>0 ? T.inDark : 'FFBBBBBB'}),
      fill: xlFill(isAlt ? T.inBg : T.inMid),
      alignment: xlAlign('right','center'),
      border: xlBorder('thin','medium','thin','thin'),
    };
    sc(R,3, inVal, inNumS, inVal>0 ? '#,##0' : '"-"');

    // E — label salida (usa custom label si existe)
    const outLabelS = {
      font: xlFont({bold: outVal>0, sz:10, color: outVal>0 ? T.outDark : 'FF888888'}),
      fill: xlFill(isAlt ? T.outBg : T.outMid),
      alignment: xlAlign('left','center'),
      border: xlBorder('thin','thin','thin','medium'),
    };
    const outLabelText = fo ? (fo.editableLabel ? (getData(ag,dk,tk,fo.id+'_label') || fo.label) : fo.label) : '';
    sc(R,4, outLabelText, outLabelS);

    // F — monto salida
    const outNumS = {
      font: xlFont({bold: outVal>0, sz:11, color: outVal>0 ? T.outDark : 'FFBBBBBB'}),
      fill: xlFill(isAlt ? T.outBg : T.outMid),
      alignment: xlAlign('right','center'),
      border: xlBorder('thin','medium','thin','thin'),
    };
    sc(R,5, outVal, outNumS, outVal>0 ? '#,##0' : '"-"');

    // G — liquidación parcial acumulada (vacío en data rows)
    sc(R,6,'',{fill:xlFill(isAlt?T.accentL:'FFFFFFFF'), border:xlBorderFull('thin','FFDDDDDD')});

    R++;
  }
  const dataEndR = R - 1;

  // ┌─────────────────────────────────────────┐
  // │  SEPARADOR antes de totales             │
  // └─────────────────────────────────────────┘
  rh(R, 4);
  for(let c=0;c<7;c++) sc(R,c,'',{fill:xlFill(T.accent), border:{bottom:side('medium',T.accent)}});
  mg(R,R,0,6); R++;

  // ┌─────────────────────────────────────────┐
  // │  FILA TOTALES                           │
  // └─────────────────────────────────────────┘
  rh(R, 26);
  const totLblS = {
    font: xlFont({bold:true, sz:12, color:'FFFFFFFF'}),
    fill: xlFill(T.inDark),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', T.inDark),
  };
  const totNumInS = {
    font: xlFont({bold:true, sz:14, color:'FF0D3B0F'}),
    fill: xlFill('FFB7E1CD'),
    alignment: xlAlign('right','center'),
    border: xlBorderFull('medium','FF34A853'),
  };
  const totLblOutS = {
    font: xlFont({bold:true, sz:12, color:'FFFFFFFF'}),
    fill: xlFill(T.outDark),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', T.outDark),
  };
  const totNumOutS = {
    font: xlFont({bold:true, sz:14, color:'FF7B0000'}),
    fill: xlFill('FFFFC7C7'),
    alignment: xlAlign('right','center'),
    border: xlBorderFull('medium','FFEA4335'),
  };

  sc(R,0,'TOTALES',{
    font: xlFont({bold:true,sz:10,color:'FFFFFFFF'}),
    fill: xlFill(T.dark),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', T.dark),
  });
  sc(R,1,'',{fill:xlFill(T.dark), border:xlBorderFull('medium',T.dark)});
  sc(R,2,'TOTAL ENTRADAS', totLblS);
  const addrTI = XLSX.utils.encode_cell({r:R,c:3});
  ws[addrTI] = {v:totalIn, f:`SUM(D${dataStartR+1}:D${dataEndR+1})`, t:'n', z:'#,##0', s:totNumInS};
  sc(R,4,'TOTAL SALIDAS', totLblOutS);
  const addrTO = XLSX.utils.encode_cell({r:R,c:5});
  ws[addrTO] = {v:totalOut, f:`SUM(F${dataStartR+1}:F${dataEndR+1})`, t:'n', z:'#,##0', s:totNumOutS};

  // G — Liquidación final con color condicional
  const liqColor = liqVal >= 0 ? T.liqPos : T.liqNeg;
  const liqBg    = liqVal >= 0 ? 'FFE6F9EE' : 'FFFDECEA';
  const liqS = {
    font: xlFont({bold:true, sz:14, color: liqColor}),
    fill: xlFill(liqBg),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', liqColor),
  };
  const addrLiq = XLSX.utils.encode_cell({r:R,c:6});
  ws[addrLiq] = {v: liqVal, f:`D${R+1}-F${R+1}`, t:'n', z:'#,##0;(#,##0)', s:liqS};
  R++;

  // ┌─────────────────────────────────────────┐
  // │  FILA RESUMEN FINAL                     │
  // └─────────────────────────────────────────┘
  rh(R, 28);
  const resLabelS = {
    font: xlFont({bold:true, sz:11, color:'FFFFFFFF'}),
    fill: xlFill(T.dark),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', T.dark),
  };
  const resValS = {
    font: xlFont({bold:true, sz:16, color: liqVal>=0 ? T.liqPos : T.liqNeg}),
    fill: xlFill(liqVal>=0 ? 'FFE8F5E9' : 'FFFFEBEE'),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', liqVal>=0 ? T.liqPos : T.liqNeg),
  };
  sc(R,0,'LIQUIDACIÓN FINAL', resLabelS);
  mg(R,R,0,5);
  const addrLiqFinal = XLSX.utils.encode_cell({r:R,c:6});
  ws[addrLiqFinal] = {v: liqVal, t:'n', z:'#,##0;(#,##0)', s:resValS};
  R++;

  // ┌─────────────────────────────────────────┐
  // │  PIE DE PÁGINA                          │
  // └─────────────────────────────────────────┘
  rh(R, 16);
  const footS = {
    font: xlFont({sz:8, color:'FFAAAAAA', italic:true}),
    fill: xlFill(T.dark),
    alignment: xlAlign('center','center'),
  };
  sc(R,0, `Generado: ${new Date().toLocaleString('es-AR')}   |   ${ag}   |   ${turno.label.toUpperCase()}   |   ${dateLabel}`, footS);
  mg(R,R,0,6);

  // ── MERGES, COLS, ROWS, REF ──
  ws['!merges'] = merges;
  ws['!cols']   = [
    {wch:5 },  // A — número
    {wch:1 },  // B — separador
    {wch:26},  // C — label entrada
    {wch:16},  // D — monto entrada
    {wch:28},  // E — label salida
    {wch:16},  // F — monto salida
    {wch:20},  // G — liquidación
  ];
  ws['!rows'] = rowH;
  ws['!ref']  = XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:R,c:6}});

  return ws;
}

// ──────────────────────────────────────
// DOWNLOAD INDIVIDUAL TURNO AS EXCEL
// ──────────────────────────────────────
function downloadTurnoExcel(ag, dk, turno) {
  const wb = XLSX.utils.book_new();
  const ws = buildTurnoWorksheet(ag, dk, turno);
  const sheetName = turno.label.replace(/\s/g,' ').substring(0,31);
  XLSX.utils.book_append_sheet(wb, ws, sheetName);

  const turnoSlug = { manana:'Manana', tarde:'Tarde', noche:'Noche' }[turno.key] || turno.key;
  const [y,m,d] = dk.split('-');
  const fname = `${ag.replace(/\s/g,'_')}_${turnoSlug}_${d}-${m}-${y}.xlsx`;
  XLSX.writeFile(wb, fname);

  const t = document.getElementById('saveToast');
  t.textContent = `✓ ${turno.label} descargado`;
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); t.textContent = '✓ Guardado'; }, 2500);
}

// ──────────────────────────────────────
// DOWNLOAD ALL AGENCIES AS EXCEL
// ──────────────────────────────────────
function downloadExcel() {
  const wb = XLSX.utils.book_new();

  AGENCIES.forEach(ag => {
    const agData = appData[ag] || {};
    const dates  = Object.keys(agData).sort();

    if (dates.length === 0) {
      const ws = {}; ws['A1'] = { v: `${ag} — Sin datos cargados`, t:'s' }; ws['!ref'] = 'A1';
      XLSX.utils.book_append_sheet(wb, ws, ag.substring(0,31));
      return;
    }

    // One sheet per agency, all dates stacked
    // For multi-day: create one sheet per day per agency named "AG18 08-03"
    dates.forEach(dk => {
      const [y,m,d] = dk.split('-');
      TURNOS.forEach(turno => {
        const ws = buildTurnoWorksheet(ag, dk, turno);
        const slug = { manana:'M', tarde:'T', noche:'N' }[turno.key];
        const sheetName = `${ag.replace(/\s/g,'')} ${d}/${m} ${slug}`.substring(0,31);
        XLSX.utils.book_append_sheet(wb, ws, sheetName);
      });
    });
  });

  const now = new Date();
  const fname = `Turnos_${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}.xlsx`;
  XLSX.writeFile(wb, fname);

  const t = document.getElementById('saveToast');
  t.textContent = '✓ Excel completo descargado';
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); t.textContent = '✓ Guardado'; }, 2500);
}
