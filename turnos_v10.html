<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Turnos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1e28;
    --border: #252a38;
    --accent-m: #f59e0b;
    --accent-t: #38bdf8;
    --accent-n: #a78bfa;
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
    --green: #34d399;
    --red: #f87171;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0d1117 0%, #12151c 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent-m), var(--accent-t));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-date {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── AGENCY TABS ── */
  .agency-nav {
    display: flex;
    gap: 4px;
    padding: 16px 32px 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--surface);
  }
  .agency-nav::-webkit-scrollbar { display: none; }

  .ag-tab {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    padding: 10px 22px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: var(--radius) var(--radius) 0 0;
    border: 1px solid transparent;
    border-bottom: none;
    transition: all 0.2s;
    white-space: nowrap;
    position: relative;
    bottom: -1px;
  }
  .ag-tab:hover {
    color: var(--text-dim);
    background: var(--surface2);
  }
  .ag-tab.active {
    color: var(--accent-m);
    background: var(--bg);
    border-color: var(--border);
    border-bottom-color: var(--bg);
  }
  .ag-tab.mono-tab.active { color: var(--accent-n); }
  .ag-tab.reporte-tab.active { color: #f472b6; }
  .ag-tab.obs-tab.active { color: #00e5ff; }
  .ag-tab.liquid-tab { color: #80FFB0; }
  .ag-tab.liquid-tab.active { color: #80FFB0; border-bottom-color: #80FFB0; }

  /* ── PLANILLA LIQUIDACIONES ── */
  .liq-wrap{padding:0 16px 16px;}
  .liq-topbar{display:flex;align-items:center;gap:10px;padding:12px 0;flex-wrap:wrap;}
  .liq-nav{display:flex;align-items:center;gap:8px;}
  .liq-nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
  .liq-nav-btn:hover{border-color:#80FFB0;color:#80FFB0;}
  .liq-date-display{font-family:'Share Tech Mono',monospace;font-size:15px;color:#80FFB0;letter-spacing:2px;cursor:pointer;min-width:100px;text-align:center;}
  .liq-date-input{background:var(--surface2);border:1px solid #80FFB0;color:#80FFB0;font-family:'Share Tech Mono',monospace;font-size:13px;padding:4px 8px;border-radius:4px;outline:none;display:none;}
  .liq-filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-left:auto;}
  .liq-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:13px;padding:5px 10px;border-radius:4px;outline:none;}
  .liq-select:focus{border-color:#80FFB0;}
  .liq-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:1px;padding:6px 14px;border-radius:4px;cursor:pointer;}
  .liq-btn:hover{border-color:#80FFB0;color:#80FFB0;}
  .liq-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px;}
  .liq-summary-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;}
  .liq-summary-lbl{font-size:9px;color:var(--text-dim);letter-spacing:1px;margin-bottom:3px;}
  .liq-summary-val{font-size:17px;font-weight:700;font-family:'Share Tech Mono',monospace;}
  .liq-summary-val.pos{color:#80FFB0;} .liq-summary-val.neg{color:#ff4757;} .liq-summary-val.warn{color:#FFD600;}
  .liq-table{width:100%;border-collapse:collapse;font-size:12px;}
  .liq-table th{background:var(--surface2);color:var(--text-dim);font-size:10px;font-weight:700;letter-spacing:1px;text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;}
  .liq-table td{padding:7px 10px;border-bottom:1px solid rgba(30,45,74,.5);vertical-align:middle;}
  .liq-table tr:hover td{background:rgba(255,255,255,.02);}
  .liq-table tr.conciliado td{opacity:.6;}
  .liq-turno-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:1px;display:inline-block;}
  .liq-turno-badge.manana{background:rgba(56,139,253,.2);color:#58a6ff;}
  .liq-turno-badge.tarde{background:rgba(230,101,0,.2);color:#ff9500;}
  .liq-turno-badge.noche{background:rgba(148,103,189,.2);color:#c084fc;}
  .liq-monto{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;}
  .liq-monto.faltante{color:#ff4757;} .liq-monto.sobrante{color:#80FFB0;}
  .liq-status{font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:10px;white-space:nowrap;display:inline-block;}
  .liq-status.pendiente{background:rgba(255,71,87,.15);color:#ff4757;border:1px solid rgba(255,71,87,.3);}
  .liq-status.conciliado{background:rgba(128,255,176,.12);color:#80FFB0;border:1px solid rgba(128,255,176,.25);}
  .liq-input{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:12px;width:100%;padding:2px 4px;outline:none;}
  .liq-input:focus{border-bottom-color:#80FFB0;}
  .liq-input.date-inp{width:100px;color:#80FFB0;font-family:'Share Tech Mono',monospace;font-size:11px;}
  .liq-empty{text-align:center;padding:3rem;color:var(--text-dim);font-size:12px;letter-spacing:2px;}
  .liq-saving{font-size:11px;color:#80FFB0;letter-spacing:1px;margin-left:8px;}

  /* ── VISOR OBS ── */
  .obs-viewer { padding: 16px; max-width: 900px; margin: 0 auto; }
  .obs-filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .obs-filters label { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }
  .obs-filter-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    font-family: 'Rajdhani', sans-serif; font-size: 13px; padding: 5px 10px; border-radius: 4px; outline: none; }
  .obs-filter-select:focus { border-color: #00e5ff; }
  .obs-date-range { display: flex; gap: 8px; align-items: center; }
  .obs-date-input { background: var(--surface2); border: 1px solid var(--border); color: #00e5ff;
    font-family: 'Share Tech Mono', monospace; font-size: 12px; padding: 5px 8px; border-radius: 4px; outline: none; }
  .obs-date-input:focus { border-color: #00e5ff; }
  .obs-count { font-size: 11px; color: var(--text-muted); margin-left: auto; letter-spacing: 1px; }

  .obs-list { display: flex; flex-direction: column; gap: 10px; }
  .obs-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; transition: border-color .15s; }
  .obs-card:hover { border-color: #00e5ff44; }
  .obs-card-header { display: flex; align-items: center; gap: 10px; padding: 8px 14px;
    background: var(--surface2); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .obs-card-fecha { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: #00e5ff; letter-spacing: 1px; }
  .obs-card-ag { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: 1px; }
  .obs-card-turno { font-size: 11px; font-weight: 700; letter-spacing: 1px; padding: 2px 8px; border-radius: 10px; }
  .obs-card-turno.manana { background: rgba(56,139,253,.15); color: #58a6ff; }
  .obs-card-turno.tarde  { background: rgba(230,101,0,.15);  color: #ff9500; }
  .obs-card-turno.noche  { background: rgba(148,103,189,.15);color: #c084fc; }
  .obs-card-op { font-size: 12px; color: var(--text-muted); letter-spacing: .5px; }
  .obs-card-body { padding: 10px 14px; font-size: 13px; color: var(--text); line-height: 1.5; white-space: pre-wrap; }
  .obs-empty { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 13px; letter-spacing: 1px; }
  .obs-btn-refresh { background: none; border: 1px solid #00e5ff44; color: #00e5ff;
    font-family: 'Rajdhani', sans-serif; font-size: 12px; letter-spacing: 1px; padding: 5px 12px;
    border-radius: 4px; cursor: pointer; }
  .obs-btn-refresh:hover { background: rgba(0,229,255,.1); }

  /* ── REPORTE ── */
  .reporte-wrap {
    padding: 28px 32px;
    animation: fadeIn 0.25s ease;
  }
  .reporte-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .reporte-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(90deg, #f472b6, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .reporte-date-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .reporte-copy-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    border: none;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(124,58,237,.35);
  }
  .reporte-copy-btn:hover {
    background: linear-gradient(135deg, #6d28d9, #5b21b6);
    transform: translateY(-1px);
  }

  /* preview card tipo WhatsApp/Telegram */
  .reporte-preview {
    background: #1a1f2e;
    border: 1px solid #2d3452;
    border-radius: 16px;
    padding: 24px 28px;
    max-width: 420px;
    margin: 0 auto 32px;
    font-family: 'DM Sans', sans-serif;
    position: relative;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  .reporte-preview::before {
    content: '● ● ●';
    position: absolute;
    top: 14px;
    left: 20px;
    font-size: 10px;
    color: #3d4460;
    letter-spacing: 4px;
  }
  .reporte-msg {
    margin-top: 12px;
    white-space: pre-wrap;
    font-size: 15px;
    line-height: 1.9;
    color: #e8eaf0;
    letter-spacing: 0.3px;
  }
  .reporte-msg .msg-fecha    { color: #f472b6; font-weight: 700; font-size: 16px; }
  .reporte-msg .msg-agencia  { color: #a78bfa; font-weight: 700; font-size: 15px; margin-top: 4px; display: block; }
  .reporte-msg .msg-turno    { color: #94a3b8; font-size: 13px; }
  .reporte-msg .msg-ok       { color: #34d399; font-weight: 600; }
  .reporte-msg .msg-pos      { color: #34d399; font-weight: 700; }
  .reporte-msg .msg-neg      { color: #f87171; font-weight: 700; }

  /* tabla de agencias */
  .reporte-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    margin-top: 24px;
  }
  .reporte-ag-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .reporte-ag-card:hover { border-color: #3a4258; }
  .reporte-ag-title {
    background: linear-gradient(90deg, #1a1f2e, #252a3a);
    padding: 10px 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    letter-spacing: 2px;
    color: #a78bfa;
    border-bottom: 1px solid var(--border);
  }
  .reporte-ag-rows { padding: 8px 0; }
  .reporte-ag-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 16px;
    border-bottom: 1px solid rgba(255,255,255,.04);
    font-size: 13px;
  }
  .reporte-ag-row:last-child { border-bottom: none; }
  .reporte-turno-label {
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    width: 32px;
  }
  .t-m { color: var(--accent-m); }
  .t-t { color: var(--accent-t); }
  .t-n { color: var(--accent-n); }
  .reporte-op { color: var(--text-muted); font-size: 12px; flex: 1; padding: 0 10px; }
  .reporte-liq-ok  { color: #34d399; font-weight: 700; font-size: 13px; }
  .reporte-liq-pos { color: #34d399; font-weight: 700; font-size: 13px; }
  .reporte-liq-neg { color: #f87171; font-weight: 700; font-size: 13px; }
  .reporte-liq-nd  { color: #4b5563; font-size: 12px; }

  /* ── CONTENT AREA ── */
  .content {
    padding: 28px 32px;
    display: none;
    animation: fadeIn 0.25s ease;
  }
  .content.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── DATE NAV ── */
  .date-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .date-nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 7px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
  }
  .date-nav-btn:hover { background: var(--surface2); color: var(--text); }

  .date-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--text);
    min-width: 220px;
    text-align: center;
  }

  /* ── DAY INPUT ── */
  .day-input-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }

  /* ── TURNO CARD ── */
  .turno-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .turno-card:hover { border-color: #3a4258; }

  .turno-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .turno-header.manana { background: linear-gradient(90deg, rgba(245,158,11,.15), transparent); }
  .turno-header.tarde  { background: linear-gradient(90deg, rgba(56,189,248,.15), transparent); }
  .turno-header.noche  { background: linear-gradient(90deg, rgba(167,139,250,.15), transparent); }

  .turno-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
  }
  .manana .turno-title { color: var(--accent-m); }
  .tarde  .turno-title { color: var(--accent-t); }
  .noche  .turno-title { color: var(--accent-n); }

  .turno-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .turno-time {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .turno-operador input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 6px;
    width: 110px;
    outline: none;
    transition: border-color 0.2s;
  }
  .turno-operador input:focus { border-color: #4a5470; }
  .turno-operador input::placeholder { color: var(--text-muted); }

  /* ── GRID INSIDE CARD ── */
  .turno-body {
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .col-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .col-label.plus  { color: var(--green); }
  .col-label.minus { color: var(--red); }

  .field-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 7px;
    gap: 8px;
  }
  .field-name {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 100px;
  }
  .field-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 6px;
    width: 100%;
    text-align: right;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .field-input:focus {
    border-color: #4a5470;
    background: #1f2433;
  }
  .field-input::placeholder { color: #3d4460; }

  .label-input {
    background: transparent;
    border: none;
    border-bottom: 1px dashed #3d4460;
    color: var(--accent-m);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 4px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s, color 0.2s;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .label-input:focus {
    border-bottom-color: var(--accent-m);
    color: #fff;
  }
  .label-input::placeholder { color: #3d4460; font-style: italic; text-transform: none; }
  .turno-card.tarde .label-input         { color: var(--accent-t); }
  .turno-card.tarde .label-input:focus   { border-bottom-color: var(--accent-t); }
  .turno-card.noche .label-input         { color: var(--accent-n); }
  .turno-card.noche .label-input:focus   { border-bottom-color: var(--accent-n); }

  .field-name-wrap {
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    min-width: 120px;
    max-width: 140px;
  }
  .editable-badge {
    font-size: 9px;
    color: #3d4460;
    letter-spacing: 0.5px;
    margin-bottom: 1px;
  }

  /* ── TOTALES ── */
  .turno-footer {
    padding: 12px 18px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .total-box {
    text-align: center;
  }
  .total-box label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    display: block;
    margin-bottom: 4px;
  }
  .total-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
  }
  .total-val.plus  { color: var(--green); }
  .total-val.minus { color: var(--red); }
  .total-val.liq   { color: var(--accent-m); }
  .turno-card.tarde  .total-val.liq { color: var(--accent-t); }
  .turno-card.noche  .total-val.liq { color: var(--accent-n); }

  /* ── DAILY SUMMARY ── */
  .day-summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    margin-top: 24px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    align-items: center;
  }
  .summary-item label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    display: block;
    margin-bottom: 6px;
  }
  .summary-val {

<script type="module">
// ── Firebase ──
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const _fbApp = initializeApp({
  apiKey: "AIzaSyCGRYyo9EmR0NB3TImzZIP4SuDpDwwMgVc",
  authDomain: "planilla-perdidas---ganancias.firebaseapp.com",
  projectId: "planilla-perdidas---ganancias",
  storageBucket: "planilla-perdidas---ganancias.firebasestorage.app",
  messagingSenderId: "179047310261",
  appId: "1:179047310261:web:2e5ad044d98751985d2ffc"
});
const _db = getFirestore(_fbApp);

async function saveAgencyToFirebase(ag) {
  try {
    await setDoc(doc(_db,'turnosData', ag.replace(/ /g,'_')), { data: JSON.stringify(appData[ag]||{}) });
  } catch(e) { console.warn('Firebase save error:', ag, e); }
}

async function loadAllFromFirebase() {
  try {
    const AGS = ['AG 18','AG 19','AG 21','AG 22','AG 23','AG 24','AG 25','SIEMPRE MONO'];
    await Promise.all(AGS.map(async ag => {
      const snap = await getDoc(doc(_db,'turnosData', ag.replace(/ /g,'_')));
      if (snap.exists()) appData[ag] = JSON.parse(snap.data().data || '{}');
    }));
    localStorage.setItem('turnosData', JSON.stringify(appData));
    return true;
  } catch(e) { console.warn('Firebase load error:', e); return false; }
}

const AGENCIES = ['AG 18','AG 19','AG 21','AG 22','AG 23','AG 24','AG 25','SIEMPRE MONO'];
const ALL_TABS  = [...AGENCIES, 'REPORTE', 'OBS', 'LIQUID.'];

// Fields for FICHAS+ (entradas) and BILLETERAS- (salidas)
// T_IN y T_OUT para calcular VERIFICACIÓN
const V_TIN  = ['fichas','astropay','prex','personal','claro','pago_pend','baja_fichas','transf','colab_rec','carga_fichas'];
const V_TOUT = ['fichas_out','astropay_out','prex_out','personal_out','bonos','descartes','colab_pag','pago_otros','carga_otros','retiro','sueldo'];
function calcVerifLocal(turnoData){
  if(!turnoData) return 0;
  const nv=v=>{
    if(v===null||v===undefined||v==='')return 0;
    const s=String(v).trim(); if(!s)return 0;
    const clean=s.replace(/\./g,'').replace(',','.');
    const n=parseFloat(clean); return isNaN(n)?0:n;
  };
  return V_TIN.reduce((s,f)=>s+nv(turnoData[f]),0) - V_TOUT.reduce((s,f)=>s+nv(turnoData[f]),0);
}
const TURNO_SHORT = { manana:'TM', tarde:'TT', noche:'TN' };

const FIELDS_IN = [
  { id:'fichas',       label:'FICHAS' },
  { id:'astropay',     label:'ASTROPAY' },
  { id:'prex',         label:'PREX' },
  { id:'personal',     label:'PERSONAL' },
  { id:'claro',        label:'CLARO' },
  { id:'pago_pend',    label:'PAGO PENDIENTE' },
  { id:'baja_fichas',  label:'BAJA FICHAS T.N.' },
  { id:'transf',       label:'TRANSF CH 18' },
  { id:'colab_rec',    label:'COLAB. RECIBIDAS', editableLabel: true },
  { id:'carga_fichas', label:'CARGA DE FICHAS',  editableLabel: true },
];
const FIELDS_OUT = [
  { id:'fichas_out',   label:'FICHAS' },
  { id:'astropay_out', label:'ASTROPAY' },
  { id:'prex_out',     label:'PREX' },
  { id:'personal_out', label:'PERSONAL' },
  { id:'bonos',        label:'BONOS' },
  { id:'descartes',    label:'DESCARTES' },
  { id:'colab_pag',    label:'COLAB. PAGADAS' },
  { id:'pago_otros',   label:'PAGO OTROS TURNOS',  editableLabel: true },
  { id:'carga_otros',  label:'CARGA OTROS TURNOS', editableLabel: true },
  { id:'retiro',       label:'RETIRO DE FICHAS' },
  { id:'sueldo',       label:'SUELDO' },
  { id:'propina',      label:'PROPINA', infoOnly: true },
];

const TURNOS = [
  { key:'manana', label:'TURNO MAÑANA',  cls:'manana', defaultStart:'06:00', defaultEnd:'14:00' },
  { key:'tarde',  label:'TURNO TARDE',   cls:'tarde',  defaultStart:'14:00', defaultEnd:'22:00' },
  { key:'noche',  label:'TURNO NOCHE',   cls:'noche',  defaultStart:'22:00', defaultEnd:'06:00' },
];

// State: data[agency][dateKey][turno][fieldId] = value
let appData = {};
let currentAgency = AGENCIES[0];

// Date navigation per agency
let agencyDates = {};
(function initDates(){
  const saved = (() => { try { const s=localStorage.getItem('turnos_dates'); return s?JSON.parse(s):null; } catch(e){return null;} })();
  const fallback = new Date(); fallback.setHours(12,0,0,0);
  AGENCIES.forEach(ag => {
    if(saved && saved[ag]){ const d=new Date(saved[ag]); agencyDates[ag]=isNaN(d)?new Date(fallback):d; }
    else { agencyDates[ag]=new Date(fallback); }
  });
})();
let reporteDate = new Date(2026, 2, 8);

function saveDates(){
  try{localStorage.setItem('turnos_dates',JSON.stringify(Object.fromEntries(AGENCIES.map(ag=>[ag,agencyDates[ag].toISOString()]))));}catch(e){}
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDateLabel(d) {
  const dias = ['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];
  const meses = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
  return `${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]} ${d.getFullYear()}`;
}

function ensureData(ag, dk, turno) {
  if (!appData[ag]) appData[ag] = {};
  if (!appData[ag][dk]) appData[ag][dk] = {};
  if (!appData[ag][dk][turno]) {
    appData[ag][dk][turno] = { operador:'', inicio:'', fin:'', obs:'' };
    [...FIELDS_IN, ...FIELDS_OUT].forEach(f => {
      appData[ag][dk][turno][f.id] = '';
      if (f.editableLabel) appData[ag][dk][turno][f.id + '_label'] = '';
    });
  } else {
    // Migrar campos nuevos que no existían en versiones anteriores
    [...FIELDS_IN, ...FIELDS_OUT].forEach(f => {
      if (appData[ag][dk][turno][f.id] === undefined) appData[ag][dk][turno][f.id] = '';
      if (f.editableLabel && appData[ag][dk][turno][f.id + '_label'] === undefined) appData[ag][dk][turno][f.id + '_label'] = '';
    });
  }
}

function getData(ag, dk, turno, field) {
  ensureData(ag, dk, turno);
  return appData[ag][dk][turno][field] || '';
}
function setData(ag, dk, turno, field, val) {
  ensureData(ag, dk, turno);
  appData[ag][dk][turno][field] = val;
}

function numVal(v) {
  const n = parseFloat(String(v).replace(/[^0-9.\-]/g,''));
  return isNaN(n) ? 0 : n;
}
function formatNum(n) {
  if (n === 0) return '-';
  return n.toLocaleString('es-AR');
}

function calcTotals(ag, dk, turno) {
  const totalIn  = FIELDS_IN.reduce((s,f) => s + numVal(getData(ag,dk,turno,f.id)), 0);
  const totalOut = FIELDS_OUT.filter(f=>!f.infoOnly).reduce((s,f) => s + numVal(getData(ag,dk,turno,f.id)), 0);
  return { totalIn, totalOut, liq: totalIn - totalOut };
}

// ──────────────────────────────────────
// BUILD UI
// ──────────────────────────────────────
// ──────────────────────────────────────
// REPORTE
// ──────────────────────────────────────

function liqLabel(liq) {
  if (liq === 0) return { text: 'OK', cls: 'reporte-liq-ok' };
  const fmt = Math.abs(liq).toLocaleString('es-AR');
  return liq > 0
    ? { text: `+$${fmt}`, cls: 'reporte-liq-pos' }
    : { text: `-$${fmt}`, cls: 'reporte-liq-neg' };
}

function liqLabelPlain(liq) {
  if (liq === 0) return 'OK';
  const fmt = Math.abs(liq).toLocaleString('es-AR');
  return liq > 0 ? `+$${fmt}` : `-$${fmt}`;
}

// ── PLANILLA LIQUIDACIONES ─────────────────────────────────────────
let liqDate = new Date(); liqDate.setHours(12,0,0,0);
let liqData = {};

const LIQ_TURNO_LABEL = { manana:'MAÑANA', tarde:'TARDE', noche:'NOCHE' };
const LIQ_TURNO_CLS   = { manana:'manana', tarde:'tarde', noche:'noche' };
const LIQ_DIAS = ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];
const VERIF_LIQ_THRESHOLD = 3000;

function liqDocKey(ag,dk,turno){ return `${ag.replace(/ /g,'_')}__${dk}__${turno}`; }

async function loadLiqData(dk){
  try{
    const snap=await getDocs(query(collection(_db,'conciliaciones'),where('fecha','==',dk)));
    snap.forEach(d=>{ liqData[d.id]=d.data(); });
  }catch(e){ console.warn('loadLiqData',e); }
}

async function saveLiqEntry(docKey,data){
  try{ await setDoc(doc(_db,'conciliaciones',docKey),data); }
  catch(e){ console.warn('saveLiqEntry',e); }
}

function renderLiquidaciones(){
  const panels=document.getElementById('contentPanels');
  panels.innerHTML='';
  const dk=dateKey(liqDate);
  const dayLabel=`${LIQ_DIAS[liqDate.getDay()]} ${String(liqDate.getDate()).padStart(2,'0')}/${String(liqDate.getMonth()+1).padStart(2,'0')}/${liqDate.getFullYear()}`;
  const wrap=document.createElement('div'); wrap.className='liq-wrap';
  wrap.innerHTML=`
    <div class="liq-topbar">
      <div class="liq-nav">
        <button class="liq-nav-btn" onclick="liqChangeDate(-1)">◀</button>
        <span class="liq-date-display" id="liqDateTxt" onclick="document.getElementById('liqDatePicker').style.display='block';document.getElementById('liqDateTxt').style.display='none';document.getElementById('liqDatePicker').focus();">${dayLabel}</span>
        <input type="date" class="liq-date-input" id="liqDatePicker" value="${dk}" onchange="liqPickDate(this.value)" onblur="document.getElementById('liqDatePicker').style.display='none';document.getElementById('liqDateTxt').style.display='inline'"/>

function buildLiqTable(){
  const dk=dateKey(liqDate);
  const agFilt=document.getElementById('liqFiltAg')?.value||'';
  const turnoFilt=document.getElementById('liqFiltTurno')?.value||'';
  const estadoFilt=document.getElementById('liqFiltEstado')?.value||'';
  const tbody=document.getElementById('liqTbody');
  if(!tbody)return;
  const rows=[];
  let totalFaltantes=0,totalSobrantes=0,totalPendientes=0;
  AGENCIES.forEach(ag=>{
    if(agFilt&&ag!==agFilt)return;
    TURNOS.forEach(t=>{
      if(turnoFilt&&t.key!==turnoFilt)return;
      const turnoData=appData[ag]?.[dk]?.[t.key];
      if(!turnoData)return;
      const verif=calcVerifLocal(turnoData);
      if(Math.abs(verif)<=VERIF_LIQ_THRESHOLD)return;
      const op=turnoData.operador?.trim()||'';
      const docKey=liqDocKey(ag,dk,t.key);
      const saved=liqData[docKey]||{};
      const conciliado=!!saved.conciliado;
      if(estadoFilt==='pendiente'&&conciliado)return;
      if(estadoFilt==='conciliado'&&!conciliado)return;
      if(verif>0)totalSobrantes+=verif; else totalFaltantes+=verif;
      if(!conciliado)totalPendientes++;
      rows.push({ag,turnoKey:t.key,op,verif,docKey,saved,conciliado});
    });
  });
  const sumEl=document.getElementById('liqSummary');
  if(sumEl){sumEl.innerHTML=`
    <div class="liq-summary-card"><div class="liq-summary-lbl">DIFERENCIAS</div><div class="liq-summary-val warn">${rows.length}</div></div>
    <div class="liq-summary-card"><div class="liq-summary-lbl">FALTANTES (+)</div><div class="liq-summary-val neg">${Math.round(totalSobrantes).toLocaleString('es-AR')}</div></div>
    <div class="liq-summary-card"><div class="liq-summary-lbl">SOBRANTES (−)</div><div class="liq-summary-val pos">${Math.round(Math.abs(totalFaltantes)).toLocaleString('es-AR')}</div></div>
    <div class="liq-summary-card"><div class="liq-summary-lbl">PENDIENTES</div><div class="liq-summary-val warn">${totalPendientes}</div></div>`;}
  if(!rows.length){tbody.innerHTML=`<tr><td colspan="9" class="liq-empty">SIN DIFERENCIAS MAYORES A 3.000 PARA ESTA FECHA</td></tr>`;return;}
  tbody.innerHTML=rows.map(r=>{
    const isFaltante=r.verif>0; // positivo=faltante, negativo=sobrante
    const sign=r.verif>0?'+':'';
    const montoFmt=sign+Math.round(r.verif).toLocaleString('es-AR');
    const tipo=isFaltante?'FALTANTE':'SOBRANTE';
    const turnoCls=LIQ_TURNO_CLS[r.turnoKey]||'';
    const turnoLbl=LIQ_TURNO_LABEL[r.turnoKey]||r.turnoKey;
    const statusCls=r.conciliado?'conciliado':'pendiente';
    const statusTxt=r.conciliado?'✓ CONCILIADO':'● PENDIENTE';
    return `<tr class="${r.conciliado?'conciliado':''}" >
      <td style="font-weight:700;color:var(--text-bright)">${r.ag}</td>
      <td><span class="liq-turno-badge ${turnoCls}">${turnoLbl}</span></td>
      <td style="color:var(--text-dim);font-size:11px">${r.op||'—'}</td>
      <td><span class="liq-monto ${isFaltante?'faltante':'sobrante'}">${montoFmt}</span></td>
      <td style="font-size:10px;font-weight:700;color:${isFaltante?'#ff4757':'#80FFB0'}">${tipo}</td>
      <td><input class="liq-input" placeholder="Causal…" value="${(r.saved.causal||'').replace(/"/g,'&quot;')}" onchange="liqSaveField('${r.docKey}','${dk}','causal',this.value)"/></td>
      <td><input type="date" class="liq-input date-inp" value="${r.saved.fechaConciliacion||''}" onchange="liqSaveField('${r.docKey}','${dk}','fechaConciliacion',this.value)"/></td>
      <td><input class="liq-input" placeholder="Observaciones…" value="${(r.saved.obs||'').replace(/"/g,'&quot;')}" onchange="liqSaveField('${r.docKey}','${dk}','obs',this.value)"/></td>
      <td><span class="liq-status ${statusCls}" style="cursor:pointer" onclick="liqToggleConciliado('${r.docKey}','${dk}',${r.conciliado})" title="Click para cambiar">${statusTxt}</span></td>
    </tr>`;
  }).join('');
}

async function liqSaveField(docKey,fecha,field,value){
  if(!liqData[docKey])liqData[docKey]={fecha};
  liqData[docKey][field]=value; liqData[docKey].fecha=fecha;
  setSavingMsg('Guardando…');
  await saveLiqEntry(docKey,liqData[docKey]);
  setSavingMsg('✓ Guardado'); setTimeout(()=>setSavingMsg(''),1500);
}

async function liqToggleConciliado(docKey,fecha,current){
  if(!liqData[docKey])liqData[docKey]={fecha};
  liqData[docKey].conciliado=!current; liqData[docKey].fecha=fecha;
  setSavingMsg('Guardando…');
  await saveLiqEntry(docKey,liqData[docKey]);
  setSavingMsg('✓ Guardado'); setTimeout(()=>setSavingMsg(''),1500);
  buildLiqTable();
}

function buildObsList() {
  const desde  = document.getElementById('obsDesde')?.value  || '';
  const hasta  = document.getElementById('obsHasta')?.value  || '';
  const agFilt = document.getElementById('obsAgente')?.value || '';
  const tkFilt = document.getElementById('obsTurno')?.value  || '';
  const list   = document.getElementById('obsList');
  if (!list) return;

  const TURNO_LABEL = { manana:'MAÑANA', tarde:'TARDE', noche:'NOCHE' };
  const TURNO_CLS   = { manana:'manana', tarde:'tarde', noche:'noche' };

  const results = [];

  // Iterar todos los datos en memoria
  AGENCIES.forEach(ag => {
    if (agFilt && ag !== agFilt) return;
    const agData = appData[ag] || {};
    Object.keys(agData).sort().forEach(dk => {
      if (desde && dk < desde) return;
      if (hasta && dk > hasta) return;
      const dayData = agData[dk];
      TURNOS.forEach(t => {
        if (tkFilt && t.key !== tkFilt) return;
        const turnoData = dayData?.[t.key];
        const obs = turnoData?.obs?.trim();
        if (!obs) return;
        const op = turnoData?.operador?.trim() || '';
        results.push({ dk, ag, turnoKey: t.key, obs, op });
      });
    });
  });

  // Ordenar más reciente primero
  results.sort((a,b) => b.dk.localeCompare(a.dk) || b.turnoKey.localeCompare(a.turnoKey));

  document.getElementById('obsCount').textContent = `${results.length} OBSERVACIÓN${results.length !== 1 ? 'ES' : ''}`;

  if (!results.length) {
    list.innerHTML = '<div class="obs-empty">SIN OBSERVACIONES PARA EL PERÍODO SELECCIONADO</div>';
    return;
  }

  list.innerHTML = results.map(r => {
    const [y,m,d] = r.dk.split('-');
    const fechaFmt = `${d}/${m}/${y}`;
    const turnoLbl = TURNO_LABEL[r.turnoKey] || r.turnoKey;
    const turnoCls = TURNO_CLS[r.turnoKey]  || '';
    return `
      <div class="obs-card">
        <div class="obs-card-header">
          <span class="obs-card-fecha">${fechaFmt}</span>
          <span class="obs-card-ag">${r.ag}</span>
          <span class="obs-card-turno ${turnoCls}">${turnoLbl}</span>
          ${r.op ? `<span class="obs-card-op">OP: ${r.op}</span>` : ''}
        </div>
        <div class="obs-card-body">${r.obs.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      </div>`;
  }).join('');

  // ── ALERTAS DE VERIFICACIÓN ──
  const verifAlerts=[];
  AGENCIES.forEach(ag=>{
    if(agFilt&&ag!==agFilt)return;
    const agData=appData[ag]||{};
    Object.keys(agData).sort().forEach(dk=>{
      if(desde&&dk<desde)return; if(hasta&&dk>hasta)return;
      const dayData=agData[dk];
      TURNOS.forEach(t=>{
        if(tkFilt&&t.key!==tkFilt)return;
        const turnoData=dayData?.[t.key];
        if(!turnoData)return;
        const verif=calcVerifLocal(turnoData);
        if(Math.abs(verif)<=3000)return;
        const op=turnoData?.operador?.trim()||'';
        verifAlerts.push({dk,ag,turnoKey:t.key,verif,op});
      });
    });
  });
  verifAlerts.sort((a,b)=>b.dk.localeCompare(a.dk));
  if(verifAlerts.length>0){
    const alertHtml=verifAlerts.map(r=>{
      const[y,m,d]=r.dk.split('-');
      const fechaFmt=`${d}/${m}/${y}`;
      const turnoLbl=TURNO_LABEL[r.turnoKey]||r.turnoKey;
      const turnoCls=TURNO_CLS[r.turnoKey]||'';
      const isPos=r.verif>0;
      const valFmt=(isPos?'+':'')+Math.round(r.verif).toLocaleString('es-AR');
      return `<div class="obs-card">
        <div class="obs-card-header">
          <span class="obs-card-fecha">${fechaFmt}</span>
          <span class="obs-card-ag">${r.ag}</span>
          <span class="obs-card-turno ${turnoCls}">${turnoLbl}</span>
          ${r.op?`<span class="obs-card-op">OP: ${r.op}</span>`:''}
        </div>
        <div class="obs-card-body" style="color:${isPos?'#80FFB0':'#ff4757'}">⚠ VERIFICACIÓN ${valFmt} · ${isPos?'SOBRANTE':'FALTANTE'}</div>
      </div>`;
    }).join('');
    list.innerHTML+=`<div class="obs-rem-day-title" style="margin-top:16px;margin-bottom:8px;">⚠ ALERTAS DE VERIFICACIÓN (${verifAlerts.length})</div>${alertHtml}`;
  }
}


function renderReporte() {
  const panels = document.getElementById('contentPanels');
  panels.innerHTML = '';
  document.getElementById('headerDate').textContent = formatDateLabel(reporteDate);

  const dk = dateKey(reporteDate);
  const [y,m,d] = dk.split('-');
  const fechaCorta = `${String(d).padStart(2,'0')} - ${['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'][+m-1]}`;

  // Construir texto del reporte
  function buildReporteText() {
    let txt = `REPORTE DEL\n${fechaCorta}\n`;
    AGENCIES.forEach(ag => {
      const hasSomeData = TURNOS.some(t => {
        const totalIn  = FIELDS_IN.reduce((s,f)  => s + numVal(getData(ag,dk,t.key,f.id)), 0);
        const totalOut = FIELDS_OUT.filter(f=>!f.infoOnly).reduce((s,f) => s + numVal(getData(ag,dk,t.key,f.id)), 0);
        return totalIn > 0 || totalOut > 0;
      });
      if (!hasSomeData) return;
      txt += `\n${ag}\n`;
      TURNOS.forEach(t => {
        const prefix = { manana:'TM', tarde:'TT', noche:'TN' }[t.key];
        const totalIn  = FIELDS_IN.reduce((s,f)  => s + numVal(getData(ag,dk,t.key,f.id)), 0);
        const totalOut = FIELDS_OUT.filter(f=>!f.infoOnly).reduce((s,f) => s + numVal(getData(ag,dk,t.key,f.id)), 0);
        const hasData  = totalIn > 0 || totalOut > 0;
        const liq      = totalIn - totalOut;
        txt += `${prefix} ${hasData ? liqLabelPlain(liq) : 'OK'}\n`;
      });
    });
    return txt.trim();
  }

  const wrap = document.createElement('div');
  wrap.className = 'reporte-wrap';

  // Header
  wrap.innerHTML = `
    <div class="reporte-header">
      <div class="reporte-title">📋 REPORTE DIARIO</div>
      <div class="reporte-date-nav">
        <button class="date-nav-btn" id="repPrev">◀</button>
        <div class="date-label">${formatDateLabel(reporteDate)}</div>
        <button class="date-nav-btn" id="repNext">▶</button>
      </div>
      <button class="reporte-copy-btn" id="repCopy">📋 Copiar Reporte</button>
    </div>

    <div style="display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start;">

      <!-- PREVIEW MENSAJE -->
      <div class="reporte-preview">
        <div class="reporte-msg" id="reporteMsg"></div>
      </div>

      <!-- TABLA DE AGENCIAS -->
      <div style="flex:1; min-width:280px;">
        <div class="reporte-grid" id="reporteGrid"></div>
      </div>

    </div>
  `;
  panels.appendChild(wrap);

  // Navegación fechas
  wrap.querySelector('#repPrev').onclick = () => {
    reporteDate = new Date(reporteDate.getTime() - 86400000);
    renderReporte();
  };
  wrap.querySelector('#repNext').onclick = () => {
    reporteDate = new Date(reporteDate.getTime() + 86400000);
    renderReporte();
  };

  // Copiar al portapapeles
  wrap.querySelector('#repCopy').onclick = () => {
    const txt = buildReporteText();
    navigator.clipboard.writeText(txt).then(() => {
      const t = document.getElementById('saveToast');
      t.textContent = '✓ Reporte copiado';
      t.classList.add('show');
      setTimeout(() => { t.classList.remove('show'); t.textContent = '✓ Guardado'; }, 2000);
    });
  };

  // Llenar preview mensaje
  const msgEl = wrap.querySelector('#reporteMsg');
  let html = `<span class="msg-fecha">REPORTE DEL\n${fechaCorta}</span>`;

  AGENCIES.forEach(ag => {
    const hasSomeData = TURNOS.some(t => {
      const ti = FIELDS_IN.reduce((s,f)  => s + numVal(getData(ag,dk,t.key,f.id)), 0);
      const to = FIELDS_OUT.filter(f=>!f.infoOnly).reduce((s,f) => s + numVal(getData(ag,dk,t.key,f.id)), 0);
      return ti > 0 || to > 0;
    });
    if (!hasSomeData) return;

    html += `\n<span class="msg-agencia">${ag}</span>`;
    TURNOS.forEach(t => {
      const prefix   = { manana:'TM', tarde:'TT', noche:'TN' }[t.key];
      const totalIn  = FIELDS_IN.reduce((s,f)  => s + numVal(getData(ag,dk,t.key,f.id)), 0);
      const totalOut = FIELDS_OUT.filter(f=>!f.infoOnly).reduce((s,f) => s + numVal(getData(ag,dk,t.key,f.id)), 0);
      const hasData  = totalIn > 0 || totalOut > 0;
      const liq      = totalIn - totalOut;
      const { text, cls } = liqLabel(hasData ? liq : 0);
      html += `\n<span class="msg-turno">${prefix} </span><span class="${cls}">${text}</span>`;
    });
  });

  msgEl.innerHTML = html;

  // Llenar grid de agencias
  const grid = wrap.querySelector('#reporteGrid');
  AGENCIES.forEach(ag => {
    const card = document.createElement('div');
    card.className = 'reporte-ag-card';

    let rowsHtml = '';
    TURNOS.forEach(t => {
      const prefix   = { manana:'TM', tarde:'TT', noche:'TN' }[t.key];
      const tCls     = { manana:'t-m', tarde:'t-t', noche:'t-n' }[t.key];
      const operador = getData(ag, dk, t.key, 'operador');
      const totalIn  = FIELDS_IN.reduce((s,f)  => s + numVal(getData(ag,dk,t.key,f.id)), 0);
      const totalOut = FIELDS_OUT.filter(f=>!f.infoOnly).reduce((s,f) => s + numVal(getData(ag,dk,t.key,f.id)), 0);
      const hasData  = totalIn > 0 || totalOut > 0;
      const liq      = totalIn - totalOut;
      const { text, cls } = liqLabel(hasData ? liq : 0);

      rowsHtml += `
        <div class="reporte-ag-row">
          <span class="reporte-turno-label ${tCls}">${prefix}</span>
          <span class="reporte-op">${operador || '—'}</span>
          <span class="${cls}">${text}</span>
        </div>`;
    });

    card.innerHTML = `
      <div class="reporte-ag-title">${ag}</div>
      <div class="reporte-ag-rows">${rowsHtml}</div>`;
    grid.appendChild(card);
  });
}

  timeRow.innerHTML = `
    <div class="time-field">
      <label>INICIO</label>
      <input type="time" value="${getData(ag,dk,turno.key,'inicio') || turno.defaultStart}" data-field="inicio" />
    </div>
    <div class="time-field">
      <label>FIN</label>
      <input type="time" value="${getData(ag,dk,turno.key,'fin') || turno.defaultEnd}" data-field="fin" />
    </div>
  `;
  card.appendChild(timeRow);

  // Body
  const body = document.createElement('div');
  body.className = 'turno-body';

  function buildFieldRow(f, ag, dk, turnoKey) {
    const row = document.createElement('div');
    row.className = 'field-row';
    const savedLabel = f.editableLabel ? (getData(ag, dk, turnoKey, f.id + '_label') || '') : '';
    if (f.editableLabel) {
      row.innerHTML = `
        <div class="field-name-wrap">
          <span class="editable-badge">✏ nombre</span>
          <input class="label-input" type="text" placeholder="${f.label}"
            value="${savedLabel}" data-field="${f.id}_label" />
        </div>
        <input class="field-input" type="text" inputmode="numeric"
          placeholder="0" value="${getData(ag,dk,turnoKey,f.id)}"
          data-field="${f.id}" />
      `;
    } else {
      row.innerHTML = `
        <span class="field-name">${f.label}</span>
        <input class="field-input" type="text" inputmode="numeric"
          placeholder="0" value="${getData(ag,dk,turnoKey,f.id)}"
          data-field="${f.id}" />
      `;
    }
    return row;
  }

  // COL IN
  const colIn = document.createElement('div');
  colIn.innerHTML = `<div class="col-label plus">FICHAS + (Entradas)</div>`;
  FIELDS_IN.forEach(f => colIn.appendChild(buildFieldRow(f, ag, dk, turno.key)));
  body.appendChild(colIn);

  // COL OUT
  const colOut = document.createElement('div');
  colOut.innerHTML = `<div class="col-label minus">BILLETERAS - (Salidas)</div>`;
  FIELDS_OUT.forEach(f => colOut.appendChild(buildFieldRow(f, ag, dk, turno.key)));
  body.appendChild(colOut);
  card.appendChild(body);

  // Footer totals
  const footer = document.createElement('div');
  footer.className = 'turno-footer';
  footer.id = `footer-${ag}-${dk}-${turno.key}`.replace(/\s/g,'_');
  card.appendChild(footer);
  updateFooter(ag, dk, turno.key, footer);

  // Events
  card.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', () => {
      const field = inp.dataset.field;
      setData(ag, dk, turno.key, field, inp.value);
      updateFooter(ag, dk, turno.key, card.querySelector(`#footer-${ag}-${dk}-${turno.key}`.replace(/\s/g,'_')));
      const summary = document.getElementById('daySummary');
      if (summary) updateSummary(ag, dk, summary);
      saveToStorage(ag);
    });
  });

  // Individual download button
  hdr.querySelector('.turno-dl-btn').addEventListener('click', () => {
    downloadTurnoExcel(ag, dk, turno);
  });

  // Observaciones
  const obsSection = document.createElement('div');
  obsSection.className = 'turno-obs';
  obsSection.innerHTML = `
    <div class="turno-obs-label">Observaciones</div>
    <textarea class="obs-textarea" placeholder="Anotá cualquier novedad del turno..."
      data-field="obs">${getData(ag, dk, turno.key, 'obs')}</textarea>
  `;
  card.appendChild(obsSection);

  // Events (obs textarea included via re-query)
  obsSection.querySelector('.obs-textarea').addEventListener('input', function() {
    setData(ag, dk, turno.key, 'obs', this.value);
    saveToStorage(ag);
  });

  return card;
}

function updateFooter(ag, dk, turnoKey, footer) {
  if (!footer) return;
  const { totalIn, totalOut, liq } = calcTotals(ag, dk, turnoKey);
  footer.innerHTML = `
    <div class="total-box">
      <label>TOTAL ENTRADAS</label>
      <div class="total-val plus">${formatNum(totalIn)}</div>
    </div>
    <div class="total-box">
      <label>TOTAL SALIDAS</label>
      <div class="total-val minus">${formatNum(totalOut)}</div>
    </div>
    <div class="total-box">
      <label>LIQUIDACIÓN</label>
      <div class="total-val liq">${liq >= 0 ? '+' : ''}${formatNum(liq)}</div>
    </div>
  `;
}

function updateSummary(ag, dk, container) {
  if (!container) return;
  let totalIn = 0, totalOut = 0, totalLiq = 0;
  TURNOS.forEach(t => {
    const c = calcTotals(ag, dk, t.key);
    totalIn  += c.totalIn;
    totalOut += c.totalOut;
    totalLiq += c.liq;
  });
  const cls = totalLiq >= 0 ? 'positive' : 'negative';
  container.innerHTML = `
    <div class="summary-item">
      <label>TOTAL DÍA — ENTRADAS</label>
      <div class="summary-val positive">${formatNum(totalIn)}</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item">
      <label>TOTAL DÍA — SALIDAS</label>
      <div class="summary-val negative">${formatNum(totalOut)}</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item">
      <label>LIQUIDACIÓN TOTAL DÍA</label>
      <div class="summary-val ${cls}">${totalLiq >= 0 ? '+' : ''}${formatNum(totalLiq)}</div>
    </div>
    <div class="summary-item">
      <label>TURNOS CARGADOS</label>
      <div class="summary-val neutral">${TURNOS.filter(t => {
        ensureData(ag, dk, t.key);
        return FIELDS_IN.some(f => getData(ag,dk,t.key,f.id) !== '') ||
               FIELDS_OUT.some(f => getData(ag,dk,t.key,f.id) !== '');
      }).length} / 3</div>
    </div>
  `;
}

// ──────────────────────────────────────
// EXPORTAR / IMPORTAR DATOS (backup JSON)
// ──────────────────────────────────────
function exportarDatos() {
  const backup = {
    version: 1,
    fecha: new Date().toISOString(),
    appData,
    agencyDates: Object.fromEntries(AGENCIES.map(ag => [ag, agencyDates[ag].toISOString()])),
    reporteDate: reporteDate.toISOString(),
  };
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const now  = new Date();
  a.href     = url;
  a.download = `turnos_backup_${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);

  const t = document.getElementById('saveToast');
  t.textContent = '✓ Backup guardado';
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); t.textContent = '✓ Guardado'; }, 2500);
}

function importarDatos(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.appData) throw new Error('Archivo inválido');

      appData = backup.appData;

      if (backup.agencyDates) {
        AGENCIES.forEach(ag => {
          if (backup.agencyDates[ag]) {
            const fecha = new Date(backup.agencyDates[ag]);
            agencyDates[ag] = fecha.getFullYear() < 2026
              ? new Date(fecha.setFullYear(2026))
              : fecha;
          }
        });
      }
      if (backup.reporteDate) {
        reporteDate = new Date(backup.reporteDate);
        if (reporteDate.getFullYear() < 2026) reporteDate.setFullYear(2026);
      }

      // Guardar en localStorage también
      localStorage.setItem('turnosData', JSON.stringify(appData));
      localStorage.setItem('turnosDates', JSON.stringify(
        Object.fromEntries(AGENCIES.map(ag => [ag, agencyDates[ag].toISOString()]))
      ));

      buildNav();
      renderContent();

      // Save to Firebase as backup
      if (true) {
        AGENCIES.forEach(ag => saveAgencyToFirebase(ag));
      }

      const t = document.getElementById('saveToast');
      t.textContent = '✓ Datos cargados correctamente';
      t.classList.add('show');
      setTimeout(() => { t.classList.remove('show'); t.textContent = '✓ Guardado'; }, 3000);
    } catch(err) {
      alert('Error al cargar el archivo. Asegurate de seleccionar un backup válido (.json)');
    }
    // Reset input para poder cargar el mismo archivo de nuevo si hace falta
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ──────────────────────────────────────
// PERSISTENCE (localStorage)
// ──────────────────────────────────────
let saveTimer = null;
function saveToStorage(changedAgency) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem('turnosData', JSON.stringify(appData));
      localStorage.setItem('turnosDates', JSON.stringify(
        Object.fromEntries(AGENCIES.map(ag => [ag, agencyDates[ag].toISOString()]))
      ));
      showToast();
      // Also save to Firebase
      if (changedAgency && saveAgencyToFirebase) {
        saveAgencyToFirebase(changedAgency);
      } else if (true) {
        AGENCIES.forEach(ag => saveAgencyToFirebase(ag));
      }
    } catch(e) {}
  }, 600);
}

function loadFromStorage() {
  try {
    // Si venimos de un Sincronizar, no sobreescribir con Firebase de nuevo
    const syncedFlag = localStorage.getItem('turnosSyncedFromFirebase');
    if (syncedFlag) {
      localStorage.removeItem('turnosSyncedFromFirebase');
      const d = localStorage.getItem('turnosData');
      if (d) appData = JSON.parse(d);
      // No llamar a Firebase, ya tenemos los datos frescos
      return;
    }
    const d = localStorage.getItem('turnosData');
    if (d) appData = JSON.parse(d);
    const dt = localStorage.getItem('turnosDates');
    if (dt) {
      const parsed = JSON.parse(dt);
      AGENCIES.forEach(ag => {
        if (parsed[ag]) {
          const fecha = new Date(parsed[ag]);
          if (fecha.getFullYear() < 2026) {
            fecha.setFullYear(2026);
          }
          agencyDates[ag] = fecha;
        }
      });
    }
  } catch(e) {}
  // Try to load from Firebase (overwrites localStorage data if available)
  loadAllFromFirebase().then(ok => {
    if (ok) {
      localStorage.setItem('turnosData', JSON.stringify(appData));
      renderContent();
    }
  }).catch(() => {});
}

function showToast() {
  const t = document.getElementById('saveToast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

function xlFill(rgb)  { return { patternType:'solid', fgColor:{ rgb } }; }
function xlFont(o)    { return { bold:o.bold||false, color:{ rgb:o.color||'FF000000' }, sz:o.sz||10, name:o.name||'Calibri', italic:o.italic||false }; }
function xlAlign(h='left',v='center',wrap=false) { return { horizontal:h, vertical:v, wrapText:wrap }; }
function side(style, rgb='FF999999') { return { style, color:{ rgb } }; }
function xlBorder(t,r,b,l) {
  return {
    top:    side(t||'thin'),
    right:  side(r||'thin'),
    bottom: side(b||'thin'),
    left:   side(l||'thin'),
  };
}
function xlBorderFull(style='thin', rgb='FFAAAAAA') {
  const s = side(style, rgb);
  return { top:s, right:s, bottom:s, left:s };
}
function xlBorderBottom(style='medium', rgb='FF555555') {
  return { bottom: side(style, rgb) };
}

// ══════════════════════════════════════════
// BUILD TURNO WORKSHEET — PLANTILLA PROFESIONAL
// ══════════════════════════════════════════
function buildTurnoWorksheet(ag, dk, turno) {
  const [y,m,d]  = dk.split('-');
  const dateObj  = new Date(+y, +m-1, +d);
  const DIAS     = ['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];
  const MESES    = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
  const dateLabel= `${DIAS[dateObj.getDay()]} ${d} DE ${MESES[+m-1]} ${y}`;
  const tk       = turno.key;
  const T        = THEME[tk];
  const operador = (getData(ag, dk, tk, 'operador') || '—').toUpperCase();
  const inicio   = getData(ag, dk, tk, 'inicio') || turno.defaultStart;
  const fin      = getData(ag, dk, tk, 'fin')    || turno.defaultEnd;
  const vIn      = FIELDS_IN.map(f  => numVal(getData(ag, dk, tk, f.id)));
  const vOut     = FIELDS_OUT.map(f => numVal(getData(ag, dk, tk, f.id)));
  const totalIn  = vIn.reduce((s,v)  => s+(v||0), 0);
  const totalOut = vOut.reduce((s,v) => s+(v||0), 0);
  const liqVal   = totalIn - totalOut;
  const maxLen   = Math.max(FIELDS_IN.length, FIELDS_OUT.length);

  const ws = {};
  const merges = [];
  const rowH = [];

  function sc(r, c, val, s, fmt) {
    const addr = XLSX.utils.encode_cell({r,c});
    ws[addr] = { v: val, t: typeof val==='number'?'n':'s', s };
    if (fmt)              ws[addr].z = fmt;
    else if (typeof val==='number') ws[addr].z = '#,##0';
  }
  function mg(r1,r2,c1,c2) { merges.push({s:{r:r1,c:c1},e:{r:r2,c:c2}}); }
  function rh(r, hpt)       { rowH[r] = {hpt}; }

  // ── COLUMNAS: A(índice) B(vacío) C(label in) D(monto in) E(label out) F(monto out) G(liq) ──
  // Total 7 cols (0–6)

  let R = 0; // row cursor

  // ┌─────────────────────────────────────────┐
  // │  ROW 0 — BANNER OSCURO CON NOMBRE AG    │
  // └─────────────────────────────────────────┘
  rh(R, 36);
  const bannerS = {
    font: xlFont({bold:true, sz:18, color:'FFFFFFFF'}),
    fill: xlFill(T.dark),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', T.dark),
  };
  for(let c=0;c<7;c++) sc(R,c,'',{fill:xlFill(T.dark), border:xlBorderFull('medium',T.dark)});
  sc(R, 0, `  CONTROL DE TURNOS  —  ${ag.toUpperCase()}`, bannerS);
  mg(R,R,0,6); R++;

  // ┌─────────────────────────────────────────┐
  // │  ROW 1 — ACENTO (color turno)           │
  // └─────────────────────────────────────────┘
  rh(R, 8);
  for(let c=0;c<7;c++) sc(R,c,'',{fill:xlFill(T.accent), border:{bottom:side('thin',T.accent)}});
  mg(R,R,0,6); R++;

  // ┌─────────────────────────────────────────┐
  // │  ROW 2 — TURNO + FECHA                  │
  // └─────────────────────────────────────────┘
  rh(R, 30);
  const turnoTitleS = {
    font: xlFont({bold:true, sz:16, color: T.dark}),
    fill: xlFill(T.accentL),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('thin','FFDDDDDD'),
  };
  const fechaS = {
    font: xlFont({bold:false, sz:12, color:'FF555555', italic:true}),
    fill: xlFill(T.accentL),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('thin','FFDDDDDD'),
  };
  sc(R, 0, `${T.icon}  ${turno.label.toUpperCase()}`, turnoTitleS);
  mg(R,R,0,3);
  sc(R, 4, dateLabel, fechaS);
  mg(R,R,4,6); R++;

  // ┌─────────────────────────────────────────┐
  // │  ROW 3 — INFO OPERADOR + HORARIO        │
  // └─────────────────────────────────────────┘
  rh(R, 22);
  const infoKeyS = {
    font: xlFont({bold:true, sz:10, color:'FFFFFFFF'}),
    fill: xlFill(T.sepBg),
    alignment: xlAlign('right','center'),
    border: xlBorderFull('thin', T.sepBg),
  };
  const infoValS = {
    font: xlFont({bold:true, sz:11, color: T.dark}),
    fill: xlFill(T.mid),
    alignment: xlAlign('left','center'),
    border: xlBorderFull('thin','FFCCCCCC'),
  };
  sc(R, 0, 'OPERADOR:', infoKeyS);
  mg(R,R,0,1);
  sc(R, 2, operador, infoValS);
  mg(R,R,2,3);
  sc(R, 4, `INICIO: ${inicio}`, infoValS);
  sc(R, 5, `FIN: ${fin}`, infoValS);
  mg(R,R,5,6); R++;

  // ┌─────────────────────────────────────────┐
  // │  ROW 4 — FILA VACÍA separador           │
  // └─────────────────────────────────────────┘
  rh(R, 6);
  for(let c=0;c<7;c++) sc(R,c,'',{fill:xlFill('FFFAFAFA')});
  mg(R,R,0,6); R++;

  // ┌─────────────────────────────────────────┐
  // │  ROW 5 — ENCABEZADOS DE SECCIONES       │
  // └─────────────────────────────────────────┘
  rh(R, 24);
  const secEmptyS = {fill:xlFill('FFF5F5F5'), border:xlBorderFull('thin','FFEEEEEE')};
  const secInS = {
    font: xlFont({bold:true, sz:12, color:'FFFFFFFF'}),
    fill: xlFill(T.inDark),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', T.inDark),
  };
  const secOutS = {
    font: xlFont({bold:true, sz:12, color:'FFFFFFFF'}),
    fill: xlFill(T.outDark),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', T.outDark),
  };
  const secLiqS = {
    font: xlFont({bold:true, sz:11, color:'FFFFFFFF'}),
    fill: xlFill(T.dark),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', T.dark),
  };
  sc(R,0,'#',    {font:xlFont({bold:true,sz:10,color:'FF888888'}), fill:xlFill('FFF0F0F0'), alignment:xlAlign('center','center'), border:xlBorderFull('thin','FFCCCCCC')});
  sc(R,1,'',     secEmptyS);
  sc(R,2,'⬆  CONCEPTO  (ENTRADAS)', secInS);
  mg(R,R,2,3);
  sc(R,4,'⬇  CONCEPTO  (SALIDAS)', secOutS);
  mg(R,R,4,5);
  sc(R,6,'LIQUIDACIÓN', secLiqS);
  R++;

  // ┌─────────────────────────────────────────┐
  // │  ROW 6 — sub-header montos              │
  // └─────────────────────────────────────────┘
  rh(R, 18);
  const subHdrBaseS = {font:xlFont({bold:true,sz:9,color:'FFFFFFFF'}), alignment:xlAlign('center','center')};
  sc(R,0,'',{fill:xlFill('FFF0F0F0'), border:xlBorderFull('thin','FFCCCCCC')});
  sc(R,1,'',{fill:xlFill('FFF0F0F0'), border:xlBorderFull('thin','FFCCCCCC')});
  sc(R,2,'CONCEPTO',    {...subHdrBaseS, fill:xlFill('FF2E7D32'), border:xlBorderFull('thin','FF1B5E20')});
  sc(R,3,'MONTO ($)',   {...subHdrBaseS, fill:xlFill('FF388E3C'), border:xlBorderFull('thin','FF1B5E20')});
  sc(R,4,'CONCEPTO',    {...subHdrBaseS, fill:xlFill('FFC62828'), border:xlBorderFull('thin','FFB71C1C')});
  sc(R,5,'MONTO ($)',   {...subHdrBaseS, fill:xlFill('FFD32F2F'), border:xlBorderFull('thin','FFB71C1C')});
  sc(R,6,'',            {...subHdrBaseS, fill:xlFill(T.dark),     border:xlBorderFull('thin',T.dark)});
  R++;

  // ┌─────────────────────────────────────────┐
  // │  ROWS 7..N — FILAS DE DATOS             │
  // └─────────────────────────────────────────┘
  const dataStartR = R;
  for (let i = 0; i < maxLen; i++) {
    rh(R, 17);
    const isAlt = i % 2 === 0;
    const fi = FIELDS_IN[i];
    const fo = FIELDS_OUT[i];
    const inVal  = fi ? (vIn[i]  || 0) : 0;
    const outVal = fo ? (vOut[i] || 0) : 0;
    const rowNum = i + 1;

    // A — número de fila
    sc(R,0, rowNum, {
      font: xlFont({sz:9, color:'FF888888'}),
      fill: xlFill(isAlt ? 'FFF5F5F5' : 'FFFFFFFF'),
      alignment: xlAlign('center','center'),
      border: xlBorderFull('thin','FFDDDDDD'),
    });
    // B — vacío separador
    sc(R,1,'',{fill:xlFill(isAlt?'FFF5F5F5':'FFFFFFFF'), border:xlBorderFull('thin','FFEEEEEE')});

    // C — label entrada (usa custom label si existe)
    const inLabelS = {
      font: xlFont({bold: inVal>0, sz:10, color: inVal>0 ? T.inDark : 'FF888888'}),
      fill: xlFill(isAlt ? T.inBg : T.inMid),
      alignment: xlAlign('left','center'),
      border: xlBorder('thin','thin','thin','medium'),
    };
    const inLabelText = fi ? (fi.editableLabel ? (getData(ag,dk,tk,fi.id+'_label') || fi.label) : fi.label) : '';
    sc(R,2, inLabelText, inLabelS);

    // D — monto entrada
    const inNumS = {
      font: xlFont({bold: inVal>0, sz:11, color: inVal>0 ? T.inDark : 'FFBBBBBB'}),
      fill: xlFill(isAlt ? T.inBg : T.inMid),
      alignment: xlAlign('right','center'),
      border: xlBorder('thin','medium','thin','thin'),
    };
    sc(R,3, inVal, inNumS, inVal>0 ? '#,##0' : '"-"');

    // E — label salida (usa custom label si existe)
    const outLabelS = {
      font: xlFont({bold: outVal>0, sz:10, color: outVal>0 ? T.outDark : 'FF888888'}),
      fill: xlFill(isAlt ? T.outBg : T.outMid),
      alignment: xlAlign('left','center'),
      border: xlBorder('thin','thin','thin','medium'),
    };
    const outLabelText = fo ? (fo.editableLabel ? (getData(ag,dk,tk,fo.id+'_label') || fo.label) : fo.label) : '';
    sc(R,4, outLabelText, outLabelS);

    // F — monto salida
    const outNumS = {
      font: xlFont({bold: outVal>0, sz:11, color: outVal>0 ? T.outDark : 'FFBBBBBB'}),
      fill: xlFill(isAlt ? T.outBg : T.outMid),
      alignment: xlAlign('right','center'),
      border: xlBorder('thin','medium','thin','thin'),
    };
    sc(R,5, outVal, outNumS, outVal>0 ? '#,##0' : '"-"');

    // G — liquidación parcial acumulada (vacío en data rows)
    sc(R,6,'',{fill:xlFill(isAlt?T.accentL:'FFFFFFFF'), border:xlBorderFull('thin','FFDDDDDD')});

    R++;
  }
  const dataEndR = R - 1;

  // ┌─────────────────────────────────────────┐
  // │  SEPARADOR antes de totales             │
  // └─────────────────────────────────────────┘
  rh(R, 4);
  for(let c=0;c<7;c++) sc(R,c,'',{fill:xlFill(T.accent), border:{bottom:side('medium',T.accent)}});
  mg(R,R,0,6); R++;

  // ┌─────────────────────────────────────────┐
  // │  FILA TOTALES                           │
  // └─────────────────────────────────────────┘
  rh(R, 26);
  const totLblS = {
    font: xlFont({bold:true, sz:12, color:'FFFFFFFF'}),
    fill: xlFill(T.inDark),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', T.inDark),
  };
  const totNumInS = {
    font: xlFont({bold:true, sz:14, color:'FF0D3B0F'}),
    fill: xlFill('FFB7E1CD'),
    alignment: xlAlign('right','center'),
    border: xlBorderFull('medium','FF34A853'),
  };
  const totLblOutS = {
    font: xlFont({bold:true, sz:12, color:'FFFFFFFF'}),
    fill: xlFill(T.outDark),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', T.outDark),
  };
  const totNumOutS = {
    font: xlFont({bold:true, sz:14, color:'FF7B0000'}),
    fill: xlFill('FFFFC7C7'),
    alignment: xlAlign('right','center'),
    border: xlBorderFull('medium','FFEA4335'),
  };

  sc(R,0,'TOTALES',{
    font: xlFont({bold:true,sz:10,color:'FFFFFFFF'}),
    fill: xlFill(T.dark),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', T.dark),
  });
  sc(R,1,'',{fill:xlFill(T.dark), border:xlBorderFull('medium',T.dark)});
  sc(R,2,'TOTAL ENTRADAS', totLblS);
  const addrTI = XLSX.utils.encode_cell({r:R,c:3});
  ws[addrTI] = {v:totalIn, f:`SUM(D${dataStartR+1}:D${dataEndR+1})`, t:'n', z:'#,##0', s:totNumInS};
  sc(R,4,'TOTAL SALIDAS', totLblOutS);
  const addrTO = XLSX.utils.encode_cell({r:R,c:5});
  ws[addrTO] = {v:totalOut, f:`SUM(F${dataStartR+1}:F${dataEndR+1})`, t:'n', z:'#,##0', s:totNumOutS};

  // G — Liquidación final con color condicional
  const liqColor = liqVal >= 0 ? T.liqPos : T.liqNeg;
  const liqBg    = liqVal >= 0 ? 'FFE6F9EE' : 'FFFDECEA';
  const liqS = {
    font: xlFont({bold:true, sz:14, color: liqColor}),
    fill: xlFill(liqBg),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', liqColor),
  };
  const addrLiq = XLSX.utils.encode_cell({r:R,c:6});
  ws[addrLiq] = {v: liqVal, f:`D${R+1}-F${R+1}`, t:'n', z:'#,##0;(#,##0)', s:liqS};
  R++;

  // ┌─────────────────────────────────────────┐
  // │  FILA RESUMEN FINAL                     │
  // └─────────────────────────────────────────┘
  rh(R, 28);
  const resLabelS = {
    font: xlFont({bold:true, sz:11, color:'FFFFFFFF'}),
    fill: xlFill(T.dark),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', T.dark),
  };
  const resValS = {
    font: xlFont({bold:true, sz:16, color: liqVal>=0 ? T.liqPos : T.liqNeg}),
    fill: xlFill(liqVal>=0 ? 'FFE8F5E9' : 'FFFFEBEE'),
    alignment: xlAlign('center','center'),
    border: xlBorderFull('medium', liqVal>=0 ? T.liqPos : T.liqNeg),
  };
  sc(R,0,'LIQUIDACIÓN FINAL', resLabelS);
  mg(R,R,0,5);
  const addrLiqFinal = XLSX.utils.encode_cell({r:R,c:6});
  ws[addrLiqFinal] = {v: liqVal, t:'n', z:'#,##0;(#,##0)', s:resValS};
  R++;

  // ┌─────────────────────────────────────────┐
  // │  PIE DE PÁGINA                          │
  // └─────────────────────────────────────────┘
  rh(R, 16);
  const footS = {
    font: xlFont({sz:8, color:'FFAAAAAA', italic:true}),
    fill: xlFill(T.dark),
    alignment: xlAlign('center','center'),
  };
  sc(R,0, `Generado: ${new Date().toLocaleString('es-AR')}   |   ${ag}   |   ${turno.label.toUpperCase()}   |   ${dateLabel}`, footS);
  mg(R,R,0,6);

  // ── MERGES, COLS, ROWS, REF ──
  ws['!merges'] = merges;
  ws['!cols']   = [
    {wch:5 },  // A — número
    {wch:1 },  // B — separador
    {wch:26},  // C — label entrada
    {wch:16},  // D — monto entrada
    {wch:28},  // E — label salida
    {wch:16},  // F — monto salida
    {wch:20},  // G — liquidación
  ];
  ws['!rows'] = rowH;
  ws['!ref']  = XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:R,c:6}});

  return ws;
}

function downloadTurnoExcel(ag, dk, turno) {
  const wb = XLSX.utils.book_new();
  const ws = buildTurnoWorksheet(ag, dk, turno);
  const sheetName = turno.label.replace(/\s/g,' ').substring(0,31);
  XLSX.utils.book_append_sheet(wb, ws, sheetName);

  const turnoSlug = { manana:'Manana', tarde:'Tarde', noche:'Noche' }[turno.key] || turno.key;
  const [y,m,d] = dk.split('-');
  const fname = `${ag.replace(/\s/g,'_')}_${turnoSlug}_${d}-${m}-${y}.xlsx`;
  XLSX.writeFile(wb, fname);

  const t = document.getElementById('saveToast');
  t.textContent = `✓ ${turno.label} descargado`;
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); t.textContent = '✓ Guardado'; }, 2500);
}

// ──────────────────────────────────────
// DOWNLOAD ALL AGENCIES AS EXCEL
// ──────────────────────────────────────
function downloadExcel() {
  const wb = XLSX.utils.book_new();

  AGENCIES.forEach(ag => {
    const agData = appData[ag] || {};
    const dates  = Object.keys(agData).sort();

    if (dates.length === 0) {
      const ws = {}; ws['A1'] = { v: `${ag} — Sin datos cargados`, t:'s' }; ws['!ref'] = 'A1';
      XLSX.utils.book_append_sheet(wb, ws, ag.substring(0,31));
      return;
    }

    // One sheet per agency, all dates stacked
    // For multi-day: create one sheet per day per agency named "AG18 08-03"
    dates.forEach(dk => {
      const [y,m,d] = dk.split('-');
      TURNOS.forEach(turno => {
        const ws = buildTurnoWorksheet(ag, dk, turno);
        const slug = { manana:'M', tarde:'T', noche:'N' }[turno.key];
        const sheetName = `${ag.replace(/\s/g,'')} ${d}/${m} ${slug}`.substring(0,31);
        XLSX.utils.book_append_sheet(wb, ws, sheetName);
      });
    });
  });

  const now = new Date();
  const fname = `Turnos_${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}.xlsx`;
  XLSX.writeFile(wb, fname);

  const t = document.getElementById('saveToast');
  t.textContent = '✓ Excel completo descargado';
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); t.textContent = '✓ Guardado'; }, 2500);
}

// ── SISTEMA DE RECORDATORIO DE OBSERVACIONES ──────────────────────
const REM_INTERVAL = 5 * 60 * 1000; // 5 minutos
let remTimer = null;
let remPaused = false;
let remCountdown = REM_INTERVAL;
let remCountInterval = null;

const TURNO_LABEL_R = { manana:'MAÑANA', tarde:'TARDE', noche:'NOCHE' };
const TURNO_CLS_R   = { manana:'manana', tarde:'tarde', noche:'noche' };
const DIAS_R = ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];

function addDays(date, n) {
  const d = new Date(date); d.setDate(d.getDate() + n); return d;
}

function getObsForDays(dates) {
  const results = [];
  dates.forEach(dt => {
    const dk = dateKey(dt);
    const dayLabel = `${DIAS_R[dt.getDay()]} ${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`;
    const dayObs = [];
    AGENCIES.forEach(ag => {
      TURNOS.forEach(t => {
        const obs = (appData[ag]?.[dk]?.[t.key]?.obs || '').trim();
        if (!obs) return;
        const op = (appData[ag]?.[dk]?.[t.key]?.operador || '').trim();
        dayObs.push({ ag, turnoKey: t.key, obs, op });
      });
    });
    if (dayObs.length) results.push({ dk, dayLabel, items: dayObs });
  });
  return results;
}

// Obtener la fecha actual de trabajo (la que tiene datos cargados, no new Date())
function getCurrentWorkDate() {
  // Tomar la fecha más reciente que tenga datos entre todos los agentes
  // O si no hay datos, usar la fecha del agente actual
  const refDate = agencyDates[currentAgency] || agencyDates[AGENCIES[0]];
  return refDate ? new Date(refDate.getTime()) : new Date();
}

function playAlertSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.12);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + i * 0.12 + 0.02);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + i * 0.12 + 0.18);
      osc.start(ctx.currentTime + i * 0.12);
      osc.stop(ctx.currentTime + i * 0.12 + 0.2);
    });
  } catch(e) {}
}

function showReminderPopup() {
  // No mostrar si ya hay uno abierto
  if (document.getElementById('obsReminder')) return;

  const today = getCurrentWorkDate();
  const dates = [today, addDays(today, 1), addDays(today, 2)];
  const data = getObsForDays(dates);

  playAlertSound();

  const overlay = document.createElement('div');
  overlay.className = 'obs-reminder-overlay';
  overlay.id = 'obsReminder';

  const totalObs = data.reduce((s, d) => s + d.items.length, 0);

  overlay.innerHTML = `
    <div class="obs-reminder-box">
      <div class="obs-rem-header">
        <span class="obs-rem-icon">🔔</span>
        <div>
          <div class="obs-rem-title">RECORDATORIO DE OBSERVACIONES</div>
          <div class="obs-rem-subtitle">${totalObs} OBSERVACIÓN${totalObs !== 1 ? 'ES' : ''} · HOY + 2 DÍAS</div>
        </div>
        <button class="obs-rem-close" onclick="closeReminder()">✕</button>
      </div>
      <div class="obs-rem-body">
        ${data.length === 0 ? '<div class="obs-rem-empty">SIN OBSERVACIONES PARA HOY NI LOS PRÓXIMOS 2 DÍAS</div>' :
          data.map(day => `
            <div class="obs-rem-day">
              <div class="obs-rem-day-title">📅 ${day.dayLabel}</div>
              ${day.items.map(item => `
                <div class="obs-rem-card">
                  <div class="obs-rem-card-hdr">
                    <span class="obs-rem-ag">${item.ag}</span>
                    <span class="obs-rem-turno ${TURNO_CLS_R[item.turnoKey]}">${TURNO_LABEL_R[item.turnoKey]}</span>
                    ${item.op ? `<span class="obs-rem-op">OP: ${item.op}</span>` : ''}
                  </div>
                  <div class="obs-rem-text">${item.obs.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
                </div>`).join('')}
            </div>`).join('')}
      </div>
      <div class="obs-rem-footer">
        <span class="obs-rem-next" id="remNextTxt">Próximo en 5:00</span>
        <div style="display:flex;gap:8px;">
          <button class="obs-rem-btn-pause" onclick="togglePauseReminder()" id="remPauseBtn">⏸ PAUSAR</button>
          <button class="obs-rem-btn-ok" onclick="closeReminder()">ENTENDIDO ✓</button>
        </div>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  startCountdown();
}

function closeReminder() {
  const el = document.getElementById('obsReminder');
  if (el) el.remove();
  stopCountdown();
}

function togglePauseReminder() {
  remPaused = !remPaused;
  const btn = document.getElementById('remPauseBtn');
  if (btn) btn.textContent = remPaused ? '▶ REANUDAR' : '⏸ PAUSAR';
  if (remPaused) {
    clearInterval(remTimer); remTimer = null;
  } else {
    scheduleReminder();
  }
}

function startCountdown() {
  stopCountdown();
  remCountdown = REM_INTERVAL;
  remCountInterval = setInterval(() => {
    if (remPaused) return;
    remCountdown -= 1000;
    const el = document.getElementById('remNextTxt');
    if (el) {
      const m = Math.floor(Math.max(remCountdown,0) / 60000);
      const s = Math.floor((Math.max(remCountdown,0) % 60000) / 1000);
      el.textContent = `Próximo en ${m}:${String(s).padStart(2,'0')}`;
    }
  }, 1000);
}

function stopCountdown() {
  if (remCountInterval) { clearInterval(remCountInterval); remCountInterval = null; }
}

function scheduleReminder() {
  if (remTimer) clearInterval(remTimer);
  remTimer = setInterval(() => {
    if (!remPaused) showReminderPopup();
  }, REM_INTERVAL);
}

window.closeReminder = closeReminder;
window.togglePauseReminder = togglePauseReminder;

// Arrancar al cargar
document.addEventListener('DOMContentLoaded', () => {
  scheduleReminder();
  // Mostrar el primero a los 5 minutos, sin mostrar inmediatamente
});
